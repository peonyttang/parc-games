<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>✨ Word Magic Kingdom ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap');
  :root{
    --pink:#ff8fcf; --pink-deep:#ff5fb4; --purple:#a98cf0; --purple-deep:#8b6ff0;
    --lilac:#e9d6ff; --mint:#bff7e3; --lemon:#fff3b0; --sky:#cfeaff;
    --cream:#fff7fc; --ink:#5b3b7a; --gold:#ffd34e;
    --shadow:0 8px 0 rgba(160,110,200,.25), 0 14px 26px rgba(160,110,200,.30);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; min-height:100%;}
  body{
    font-family:'Baloo 2','Comic Sans MS','Trebuchet MS',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 12% 12%, #ffe0f4 0 22%, transparent 22%),
      radial-gradient(circle at 88% 18%, #e3d6ff 0 20%, transparent 20%),
      radial-gradient(circle at 80% 88%, #d5f3ff 0 24%, transparent 24%),
      linear-gradient(160deg, #fff0fa 0%, #f3e7ff 45%, #e7f6ff 100%);
    background-attachment:fixed;
    overflow-x:hidden;
    user-select:none;
  }
  /* floating background sparkles */
  .bg-emoji{position:fixed; font-size:34px; opacity:.45; pointer-events:none; z-index:0; animation:floaty 7s ease-in-out infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-22px) rotate(8deg);}}

  .wrap{position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:14px 22px 60px;}
  .wrap.narrow{max-width:780px;}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:linear-gradient(90deg,var(--pink),var(--purple));
    border-radius:24px; padding:10px 14px; color:#fff;
    box-shadow:var(--shadow); margin-bottom:14px; flex-wrap:wrap;
  }
  .brand{font-size:22px; font-weight:900; text-shadow:0 2px 0 rgba(0,0,0,.12); display:flex; align-items:center; gap:6px;}
  .stats{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{background:rgba(255,255,255,.9); color:var(--ink); border-radius:18px; padding:6px 12px; font-weight:900; font-size:15px; box-shadow:0 3px 0 rgba(0,0,0,.08); display:flex; align-items:center; gap:5px;}
  .chip.gem{color:#c44ca0;}
  .chip.star{color:#d79b00;}

  /* ---------- buttons ---------- */
  button{font-family:inherit; cursor:pointer; border:none;}
  .btn{
    background:linear-gradient(180deg,#fff,#ffe6f6);
    border:3px solid #fff; border-radius:20px; padding:12px 18px;
    font-weight:900; font-size:17px; color:var(--ink);
    box-shadow:0 6px 0 rgba(160,110,200,.35); transition:transform .07s, box-shadow .07s;
  }
  .btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(160,110,200,.35);}
  .btn.primary{background:linear-gradient(180deg,var(--pink),var(--pink-deep)); color:#fff; border-color:#ffd9ef;}
  .btn.purple{background:linear-gradient(180deg,var(--purple),var(--purple-deep)); color:#fff; border-color:#e3d6ff;}
  .btn.big{font-size:20px; padding:16px 26px;}
  .btn:disabled{opacity:.5; cursor:default; transform:none;}

  /* ---------- cards / panels ---------- */
  .panel{
    background:rgba(255,255,255,.62);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border-radius:26px; padding:22px 26px;
    box-shadow:0 10px 30px rgba(160,110,200,.14);
    border:1px solid rgba(255,255,255,.7);
    margin-bottom:16px;
  }
  h1,h2,h3{margin:.2em 0;}
  .center{text-align:center;}

  /* ---------- home mode grid ---------- */
  /* Mode cards — wide arcade layout (3 cols × 2 rows on desktop) */
  .mode-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px;}
  @media(max-width:980px){ .mode-grid{grid-template-columns:repeat(2,1fr);} }
  @media(max-width:640px){ .mode-grid{grid-template-columns:1fr;} }

  .mode-card{
    position:relative; cursor:pointer;
    background:#fff; border-radius:22px; padding:22px 22px 18px;
    border:3px solid var(--lilac);
    box-shadow:0 0 0 4px rgba(255,255,255,.55), 0 10px 26px rgba(160,110,200,.15);
    transition:transform .12s, box-shadow .12s;
    display:flex; flex-direction:column; min-height:210px;
  }
  .mode-card:hover{transform:translateY(-3px);}
  .mode-card:active{transform:scale(.985);}
  .mode-card .num{position:absolute; top:14px; right:18px; font-size:13px; font-weight:900; letter-spacing:2px; opacity:.85;}
  .mode-card .nm{display:block; font-size:24px; font-weight:900; margin:0; line-height:1.05; text-shadow:none;}
  .mode-card .lvl{font-size:12px; font-weight:900; color:#9a7bbd; letter-spacing:1.5px; margin:6px 0 10px; text-transform:uppercase;}
  .mode-card .ds{display:block; font-size:18px; color:var(--ink); line-height:1.45; flex:1; opacity:1; margin:0;}
  .mode-card .card-foot{display:flex; justify-content:space-between; align-items:center; margin-top:12px;}
  .mode-card .stars{font-size:18px; letter-spacing:4px; color:#d6c4ea;}
  .mode-card .stars .on{color:var(--gold); text-shadow:0 0 6px rgba(255,211,78,.45);}
  .mode-card .play-btn{font-size:13px; font-weight:900; padding:8px 18px; border-radius:18px; letter-spacing:2px; color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.08);}

  /* Per-card accent colors */
  .m1{border-color:#ff5fb4; box-shadow:0 0 0 4px rgba(255,95,180,.10), 0 10px 24px rgba(255,95,180,.22);}
  .m1 .nm,.m1 .num{color:#ff5fb4;}
  .m1 .play-btn{background:linear-gradient(180deg,#ff9ad6,#ff5fb4);}
  .m2{border-color:#8b6ff0; box-shadow:0 0 0 4px rgba(139,111,240,.10), 0 10px 24px rgba(139,111,240,.22);}
  .m2 .nm,.m2 .num{color:#8b6ff0;}
  .m2 .play-btn{background:linear-gradient(180deg,#b79bff,#8b6ff0);}
  .m3{border-color:#34c79b; box-shadow:0 0 0 4px rgba(52,199,155,.10), 0 10px 24px rgba(52,199,155,.22);}
  .m3 .nm,.m3 .num{color:#1f9c76;}
  .m3 .play-btn{background:linear-gradient(180deg,#79e0c0,#34c79b);}
  .m4{border-color:#ffab3d; box-shadow:0 0 0 4px rgba(255,171,61,.12), 0 10px 24px rgba(255,171,61,.22);}
  .m4 .nm,.m4 .num{color:#d97800;}
  .m4 .play-btn{background:linear-gradient(180deg,#ffd36b,#ffab3d); color:#5b3b7a;}
  .m5{border-color:#3b8de8; box-shadow:0 0 0 4px rgba(59,141,232,.10), 0 10px 24px rgba(59,141,232,.22);}
  .m5 .nm,.m5 .num{color:#1f6dbf;}
  .m5 .play-btn{background:linear-gradient(180deg,#79c4ff,#3b8de8);}
  .m6{border-color:#ff5a78; box-shadow:0 0 0 4px rgba(255,90,120,.10), 0 10px 24px rgba(255,90,120,.22);}
  .m6 .nm,.m6 .num{color:#e0395a;}
  .m6 .play-btn{background:linear-gradient(180deg,#ff95a6,#ff5a78);}

  /* Glowing hero */
  .hero{
    position:relative; text-align:center; padding:22px 22px 18px;
    background:none; border:none; box-shadow:none;
    margin-bottom:14px;
  }
  .hero-mascot{font-size:74px; display:inline-block; line-height:1;
    filter:drop-shadow(0 0 26px rgba(255,95,180,.55)) drop-shadow(0 0 6px rgba(169,140,240,.5));
    animation:bob 3.5s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  .hero-title{font-size:48px; font-weight:900; color:var(--pink-deep); letter-spacing:2px; margin:10px 0 6px;
    text-shadow:0 2px 0 rgba(255,95,180,.16), 0 0 22px rgba(255,95,180,.35); text-transform:uppercase;}
  .hero-sub{font-size:15px; font-weight:900; color:#d79b00; letter-spacing:3px; text-transform:uppercase;}
  .hero-desc{font-size:19px; color:#7d5fa3; margin:10px auto 14px; max-width:760px; line-height:1.5;}

  /* Wide Word of the Day banner */
  .wod-banner{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    background:linear-gradient(110deg,#fff0fa 0%, #e3d6ff 60%, #d8efff 100%);
    border:4px solid #fff; border-radius:24px; padding:22px 28px; box-shadow:var(--shadow);
    margin-bottom:20px; text-align:center;
  }
  .wod-banner .wod-left{text-align:center;}
  .wod-banner .wod-label{font-size:13px; letter-spacing:2.5px; font-weight:900; color:var(--purple-deep); text-transform:uppercase;}
  .wod-banner .wod-word{font-size:46px; font-weight:900; color:var(--pink-deep); margin:6px 0 4px; line-height:1; text-shadow:0 2px 0 rgba(255,95,180,.18);}
  .wod-banner .wod-def{font-size:21px; color:var(--ink); font-weight:700;}
  .wod-banner .wod-tip{font-size:17px; color:#7d5fa3; font-weight:700; text-align:center; margin:8px 0 0;}

  /* Footer action area */
  .hud-foot{text-align:center; margin-top:18px; padding:18px 6px 6px; background:none; border:none; box-shadow:none;}
  .hud-foot .hud-hint{font-size:17px; color:#9a7bbd; margin:0 0 14px; font-weight:700;}
  .hud-foot .row{justify-content:center; gap:14px;}
  .hud-foot .hud-grownup{font-size:14px; color:#bba6d4; margin:14px 0 0;}

  /* floating game-page header (Home + title + level dots) */
  .game-header{
    display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
    gap:10px; margin-bottom:18px; padding:4px 6px;
  }
  .game-header .game-title{
    margin:0; flex:1; text-align:center; font-size:30px; font-weight:900;
    color:var(--pink-deep); text-shadow:0 2px 0 rgba(255,95,180,.16), 0 0 22px rgba(255,95,180,.28);
  }
  .game-header .game-spacer{width:84px;}
  .game-header .levelbar{flex-basis:100%; margin-top:6px;}

  /* ---------- level progress dots ---------- */
  .levelbar{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:6px auto 4px; padding:8px 14px;
    background:rgba(255,255,255,.55); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border-radius:60px; border:1px solid rgba(255,255,255,.7); box-shadow:0 6px 18px rgba(160,110,200,.10);}
  .ldot{width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; background:#fff; border:3px solid var(--lilac); color:var(--purple-deep);}
  .ldot.done{background:linear-gradient(180deg,#ffe27a,var(--gold)); border-color:#fff; color:#fff;}
  .ldot.cur{background:linear-gradient(180deg,var(--pink),var(--pink-deep)); border-color:#fff; color:#fff; transform:scale(1.12); box-shadow:0 4px 10px rgba(255,95,180,.5);}

  /* ---------- matching mode ---------- */
  .match-area{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .col-title{font-weight:900; text-align:center; margin-bottom:8px; color:var(--purple-deep);}
  .word-token{
    background:linear-gradient(180deg,#fff,#ffe9f7); border:3px solid var(--pink);
    border-radius:18px; padding:12px; font-size:18px; font-weight:900; text-align:center;
    margin-bottom:10px; box-shadow:0 4px 0 rgba(255,95,180,.3); cursor:grab; touch-action:none;
    min-height:64px; display:flex; align-items:center; justify-content:center;
  }
  .word-token.dragging{opacity:.35;}
  .word-token.placed{opacity:.25; border-style:dashed; cursor:default;}
  .drop-slot{
    background:#fff; border:3px dashed var(--purple); border-radius:18px;
    padding:10px; margin-bottom:10px; min-height:64px; display:flex; align-items:center; gap:10px;
    transition:background .1s, transform .1s;
  }
  .drop-slot .pic{font-size:38px;}
  .drop-slot .lbl{font-size:15px; font-weight:900; flex:1;}
  .drop-slot.over{background:var(--lemon); transform:scale(1.03);}
  .drop-slot.correct{border-style:solid; border-color:#34c79b; background:#e6fff6;}
  .drop-slot .answer{font-weight:900; color:#1f9c76;}

  /* ---------- quiz (fill blank / synonym / feelings) ---------- */
  .qstory{font-size:19px; line-height:1.7; background:var(--lilac); border-radius:18px; padding:16px; margin-bottom:14px;}
  .blank{display:inline-block; min-width:84px; border-bottom:4px dotted var(--purple-deep); text-align:center; font-weight:900; color:var(--pink-deep);}
  .options{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
  .opt{
    background:linear-gradient(180deg,#fff,#f1e7ff); border:3px solid var(--purple);
    border-radius:18px; padding:14px; font-size:18px; font-weight:900; color:var(--ink);
    box-shadow:0 5px 0 rgba(139,111,240,.3); transition:transform .07s;
  }
  .opt:active{transform:translateY(3px);}
  .opt.right{background:linear-gradient(180deg,#b9ffe4,#4fd6a6); color:#0a6b4d; border-color:#fff;}
  .opt.wrong{background:linear-gradient(180deg,#ffd0d0,#ff9b9b); color:#9b2b2b; border-color:#fff;}
  .prompt-big{font-size:26px; font-weight:900; text-align:center; color:var(--purple-deep); margin:6px 0 4px;}
  .hintline{text-align:center; color:#9a7bbd; font-size:15px; margin-bottom:14px;}

  /* ---------- story builder ---------- */
  .builder-template{font-size:19px; line-height:1.9; background:var(--lilac); border-radius:18px; padding:16px; margin-bottom:14px;}
  .pick-slot{display:inline-block; min-width:90px; padding:2px 10px; border-radius:12px; border:3px dashed var(--pink-deep); font-weight:900; color:var(--pink-deep); background:#fff; cursor:pointer;}
  .pick-slot.filled{border-style:solid; background:linear-gradient(180deg,#fff,#ffe9f7);}
  .pick-slot.active{box-shadow:0 0 0 4px var(--lemon);}
  .bank-title{font-weight:900; color:var(--purple-deep); margin:10px 0 6px;}
  .bank{display:flex; flex-wrap:wrap; gap:8px;}
  .bank .opt{padding:9px 14px; font-size:16px; box-shadow:0 4px 0 rgba(139,111,240,.25);}
  .builder-final{font-size:20px; line-height:1.6; background:#fff; border:3px solid var(--mint); border-radius:18px; padding:16px; margin-top:14px; color:#0a6b4d; font-weight:900;}

  /* ---------- feedback toast ---------- */
  .toast{
    position:fixed; left:50%; top:30%; transform:translate(-50%,-50%) scale(0);
    background:#fff; border:5px solid var(--gold); border-radius:26px; padding:18px 30px;
    font-size:26px; font-weight:900; color:var(--pink-deep); z-index:50; text-align:center;
    box-shadow:0 16px 40px rgba(0,0,0,.25); transition:transform .25s cubic-bezier(.2,1.6,.4,1); pointer-events:none;
  }
  .toast.show{transform:translate(-50%,-50%) scale(1);}
  .toast small{display:block; font-size:15px; color:var(--purple-deep); margin-top:4px;}

  /* ---------- progress text ---------- */
  .miniprog{text-align:center; font-weight:900; color:var(--purple-deep); margin-bottom:6px;}
  .row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:8px;}
  .backbtn{font-size:15px;}

  /* level complete screen */
  .stars-big{font-size:54px; letter-spacing:6px; text-align:center; margin:6px 0;}
  .reward{font-size:20px; text-align:center; font-weight:900; color:var(--pink-deep);}

  /* confetti */
  .confetti{position:fixed; top:-20px; font-size:22px; z-index:40; pointer-events:none; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg); opacity:.9;}}

  /* sticker reward shelf */
  .shelf{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:8px;}
  .sticker{font-size:30px; background:#fff; border-radius:50%; width:48px; height:48px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 rgba(160,110,200,.25); border:3px solid var(--lilac);}
  .sticker.locked{filter:grayscale(1) opacity(.35);}

  /* stage selector */
  .stage-row{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:6px;}
  .stage-tab{display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 10px; min-width:74px; border-radius:18px; border:3px solid #fff; background:#fff; color:var(--ink); cursor:pointer; box-shadow:0 4px 0 rgba(160,110,200,.18); transition:transform .08s;}
  .stage-tab .si{font-size:22px; line-height:1;}
  .stage-tab .sn{font-size:13px; font-weight:900;}
  .stage-tab .sl{font-size:10px; color:#9a7bbd; font-weight:900;}
  .stage-tab:active{transform:translateY(2px);}
  .stage-tab.active{color:#fff; border-color:#fff; box-shadow:0 6px 0 rgba(0,0,0,.18);}
  .stage-tab.active .sl{color:rgba(255,255,255,.85);}
  .stage-tab.st0.active{background:linear-gradient(160deg,#ff9ad6,#ff5fb4);}
  .stage-tab.st1.active{background:linear-gradient(160deg,#b79bff,#8b6ff0);}
  .stage-tab.st2.active{background:linear-gradient(160deg,#79e0c0,#34c79b);}
  .stage-tab.st3.active{background:linear-gradient(160deg,#ffd36b,#ffab3d);}
  .stage-tab.st4.active{background:linear-gradient(160deg,#ff9ad6,#a98cf0);}

  /* slightly smaller option text for meanings/idioms (longer phrases) */
  .opt.small-opt{font-size:15px; line-height:1.25; padding:12px;}

  /* trophy room */
  .trophy-row{display:flex; align-items:center; gap:12px; background:#fff; border:3px solid var(--lilac); border-radius:18px; padding:12px; margin-bottom:10px;}
  .trophy-row .tico{font-size:34px;}
  .trophy-row .tinfo{flex:1; text-align:left; min-width:0;}
  .trophy-row .tnm{font-weight:900; color:var(--purple-deep);}
  .trophy-row .tsub{font-size:13px; color:#9a7bbd; margin:2px 0 6px;}
  .trophy-row .tbar{height:12px; background:var(--lilac); border-radius:8px; overflow:hidden;}
  .trophy-row .tfill{height:100%; background:linear-gradient(90deg,var(--pink),var(--gold)); border-radius:8px; transition:width .5s;}
  .trophy-row .tstars{font-weight:900; color:#d79b00; font-size:18px; white-space:nowrap;}
  .trophy-row .tstars small{color:#c9b3d8; font-size:13px;}

  /* word of the day */
  .wod-card{background:linear-gradient(160deg,#fff6fb,#fce8ff); border:4px solid #fff;}
  .wod-card .wod-label{font-size:12px; font-weight:900; color:var(--purple-deep); letter-spacing:1.5px; text-transform:uppercase;}
  .wod-card .wod-word{font-size:34px; font-weight:900; color:var(--pink-deep); margin:6px 0 2px; line-height:1.1; text-shadow:0 2px 0 rgba(255,95,180,.15);}
  .wod-card .wod-def{font-size:16px; color:var(--ink); font-weight:700;}
  .wod-card .wod-tip{font-size:12px; color:#9a7bbd; margin:8px 0 0;}

  /* arcade banner on home */
  .arcade-banner{
    display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap;
    background:linear-gradient(110deg,#fff0fa 0%, #f3e1ff 40%, #d8efff 100%);
    border:4px solid #fff; border-radius:24px; padding:18px 24px;
    box-shadow:0 8px 30px rgba(255,95,180,.18);
    margin-bottom:18px; position:relative; overflow:hidden;
  }
  .arcade-banner.lit{ animation:abShimmer 3.5s ease-in-out infinite; }
  @keyframes abShimmer{
    0%,100%{ box-shadow:0 8px 30px rgba(255,95,180,.18); }
    50%{ box-shadow:0 10px 38px rgba(169,140,240,.35), 0 0 0 4px rgba(255,255,255,.4); }
  }
  .arcade-banner .ab-left{display:flex; align-items:center; gap:14px;}
  .arcade-banner .ab-icon{font-size:40px; filter:drop-shadow(0 0 14px rgba(255,95,180,.55));}
  .arcade-banner .ab-text .ab-label{font-size:14px; letter-spacing:2.5px; font-weight:900; color:var(--purple-deep); text-transform:uppercase;}
  .arcade-banner .ab-text .ab-stage{font-size:26px; font-weight:900; color:var(--pink-deep); line-height:1.1; text-shadow:0 2px 0 rgba(255,95,180,.18);}
  .arcade-banner .ab-text .ab-hint{font-size:14px; color:#7d5fa3; margin-top:2px;}
  .arcade-banner .ab-play{font-size:18px; padding:14px 26px; border-radius:22px; font-weight:900; letter-spacing:1.5px; color:#fff;
    background:linear-gradient(180deg,#ff9ad6,#ff5fb4); border:3px solid #fff; cursor:pointer;
    box-shadow:0 6px 0 rgba(255,95,180,.35);}
  .arcade-banner .ab-play:active{transform:translateY(3px); box-shadow:0 3px 0 rgba(255,95,180,.35);}
  .arcade-banner .ab-play .ct{display:inline-block; background:rgba(255,255,255,.85); color:var(--pink-deep); border-radius:14px; padding:2px 10px; margin-left:8px; font-size:15px;}
  .arcade-banner.dim{ background:linear-gradient(110deg,#f4eef9,#ece4f6); }
  .arcade-banner.dim .ab-icon{filter:grayscale(.4) opacity(.55);}
  .arcade-banner.dim .ab-text .ab-stage{color:#9a7bbd;}
  .arcade-banner.dim .ab-locked{font-size:14px; color:#9a7bbd; font-weight:700; background:rgba(255,255,255,.6); padding:10px 16px; border-radius:18px;}

  /* arcade overlay */
  .arcade-overlay{
    display:none; position:fixed; inset:0; z-index:100;
    background:linear-gradient(160deg,#fde4f3 0%, #e9d6ff 50%, #d8efff 100%);
    flex-direction:column; align-items:center; justify-content:center;
    padding:16px;
  }
  .arcade-overlay.show{ display:flex; }
  .arcade-overlay h2{

const State = {

  stickers: [],
  currentStage: 0,
  progress: { 0:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0}, 1:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0}, 2:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0}, 3:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0}, 4:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0} },
  levelStars: { 0:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}}, 1:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}}, 2:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}}, 3:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}}, 4:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}} },
  mistakes: {},
  arcadeCharges: 0,
  arcadeStage: 1,
  arcadeBestStage: 1
};

/* ---------- tiny sound effects (Web Audio, no files) ---------- */
let actx=null;
function beep(freq=600, dur=0.12, type='sine', vol=0.15){
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sndRight(){ beep(660,0.1,'triangle'); setTimeout(()=>beep(880,0.14,'triangle'),90); }
function sndWrong(){ beep(220,0.18,'sawtooth',0.1); }
function sndWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'triangle'),i*120)); }
function sndPop(){ beep(900,0.06,'sine',0.12); }

/* ---------- helpers ---------- */
const $ = sel => document.querySelector(sel);
const screen = () => $('#screen');
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
/* ---------- save / load progress on the device ---------- */
const SAVE_KEY='wordMagicKingdom_v1';
function saveState(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify({
    gems:State.gems, stars:State.stars, stickers:State.stickers,
    currentStage:State.currentStage, progress:State.progress, levelStars:State.levelStars,
    mistakes:State.mistakes,
    arcadeCharges:State.arcadeCharges, arcadeStage:State.arcadeStage, arcadeBestStage:State.arcadeBestStage
  })); }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const d=JSON.parse(raw);
    if(typeof d.gems==='number') State.gems=d.gems;
    if(typeof d.stars==='number') State.stars=d.stars;
    if(Array.isArray(d.stickers)) State.stickers=d.stickers;
    if(typeof d.currentStage==='number') State.currentStage=d.currentStage;
    // migrate legacy flat progress/levelStars (single-stage) into stage 0
    function isLegacy(obj){ return obj && typeof obj==='object' && !(0 in obj) && ('match' in obj); }
    if(d.progress && typeof d.progress==='object'){
      if(isLegacy(d.progress)){
        Object.assign(State.progress[0], d.progress);
      } else {
        for(const s of [0,1,2,3,4]) if(d.progress[s]) Object.assign(State.progress[s], d.progress[s]);
      }
    }
    if(d.levelStars && typeof d.levelStars==='object'){
      if(isLegacy(d.levelStars)){
        for(const k of ['match','fill','build','hunt','mean','idiom']) if(d.levelStars[k]) State.levelStars[0][k]=d.levelStars[k];
      } else {
        for(const s of [0,1,2,3,4]) if(d.levelStars[s]) { for(const k of ['match','fill','build','hunt','mean','idiom']) if(d.levelStars[s][k]) State.levelStars[s][k]=d.levelStars[s][k]; }
      }
      recomputeStars();
    }
    if(d.mistakes && typeof d.mistakes==='object') State.mistakes=d.mistakes;
    if(typeof d.arcadeCharges==='number') State.arcadeCharges=d.arcadeCharges;
    if(typeof d.arcadeStage==='number') State.arcadeStage=d.arcadeStage;
    if(typeof d.arcadeBestStage==='number') State.arcadeBestStage=d.arcadeBestStage;
  }catch(e){}
}
function recomputeStars(){
  let s=0;
  for(const stg of [0,1,2,3,4]){
    const ls=State.levelStars[stg]||{};
    for(const k of ['match','fill','build','hunt','mean','idiom']){ const m=ls[k]||{}; for(const i in m) s+=m[i]; }
  }
  State.stars=s;
}
function resetAll(){
  State.gems=0; State.stars=0; State.stickers=[];
  State.currentStage=0;
  State.progress={ 0:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0}, 1:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0}, 2:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0}, 3:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0}, 4:{match:0,fill:0,build:0,hunt:0,mean:0,idiom:0} };
  State.levelStars={ 0:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}}, 1:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}}, 2:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}}, 3:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}}, 4:{match:{},fill:{},build:{},hunt:{},mean:{},idiom:{}} };
  State.mistakes={};
  State.arcadeCharges=0; State.arcadeStage=1; State.arcadeBestStage=1;
  saveState(); updateStats();
}
function updateStats(){ $('#gems').textContent=State.gems; $('#stars').textContent=State.stars; saveState(); }
function addGems(n){ State.gems+=n; updateStats(); }
function addStars(n){ State.stars+=n; updateStats(); }

function pickStage(s){ sndPop(); State.currentStage=s; saveState(); home(); }
function modeCard(key, n, cls, nm, ds, total, done, starsFilled){
  starsFilled = Math.max(0, Math.min(3, starsFilled|0));
  const stars = '<span class="on">★</span>'.repeat(starsFilled) + '★'.repeat(3-starsFilled);
  return `<div class="mode-card ${cls}" onclick="startMode('${key}')">
    <span class="num">${String(n).padStart(2,'0')}</span>
    <h3 class="nm">${nm}</h3>
    <div class="lvl">Lv ${Math.min(done+1,total)} / ${total}</div>
    <p class="ds">${ds}</p>
    <div class="card-foot">
      <span class="stars">${stars}</span>
      <span class="play-btn">PLAY ▶</span>
    </div>
  </div>`;
}

function startMode(key){
  sndPop();
  const stg = State.currentStage;
  const lvls = ({match:MATCH_LEVELS(),fill:FILL_LEVELS(),build:BUILD_LEVELS(),hunt:HUNT_LEVELS(),mean:MEAN_LEVELS(),idiom:IDIOM_LEVELS()})[key];
  const total = lvls.length;
  const start = Math.min(State.progress[stg][key], total-1);
  if(key==='match') renderMatch(start);
  if(key==='fill')  renderFill(start);
  if(key==='build') renderBuild(start);
  if(key==='hunt')  renderHunt(start);
  if(key==='mean')  renderMean(start);
  if(key==='idiom') renderIdiom(start);
}

function levelDots(key,total,cur){
  const done = State.progress[State.currentStage][key];
  let h='<div class="levelbar">';
  for(let i=0;i<total;i++){
    const cls = i<done?'done': (i===cur?'cur':'');
    h+=`<div class="ldot ${cls}">${i<done?'★':(i+1)}</div>`;
  }
  return h+'</div>';
}

function header(title, key){
  const lvls = ({match:MATCH_LEVELS(),fill:FILL_LEVELS(),build:BUILD_LEVELS(),hunt:HUNT_LEVELS(),mean:MEAN_LEVELS(),idiom:IDIOM_LEVELS()})[key];
  return `<div class="game-header">
    <button class="btn backbtn" onclick="home()">🏠 Home</button>
    <h2 class="game-title">${title}</h2>
    <span class="game-spacer"></span>
    ${levelDots(key, lvls.length, currentLevel)}
  </div>`;
}

let currentLevel = 0;

/* =========================================================
   MODE 1 — DRAG & DROP MATCHING
   ========================================================= */
function renderMatch(lvl){
  currentLevel = lvl;
  const pairs = MATCH_LEVELS()[lvl];
  const words = shuffle(pairs.map(p=>p.w));
  const slots = shuffle(pairs.slice());
  let solved = 0;

  go(`
    ${header('🧩 Match the Words', 'match')}
    <div class="panel">
      <p class="hintline">Drag each describing word onto the picture it matches! ✨</p>
      <div class="match-area">
        <div>
          <div class="col-title">✨ Words</div>
          <div id="wordcol">
            ${words.map(w=>`<div class="word-token" draggable="true" data-w="${w}">${w}</div>`).join('')}
          </div>
        </div>
        <div>
          <div class="col-title">🖼️ Pictures</div>
          <div id="slotcol">
            ${slots.map(s=>`<div class="drop-slot" data-ans="${s.w}">
              <span class="pic">${s.p}</span><span class="lbl">${s.n}</span>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `);

  const total = pairs.length;
  let dragWord = null;

  // --- desktop drag ---
  screen().querySelectorAll('.word-token').forEach(tok=>{
    tok.addEventListener('dragstart', e=>{ dragWord=tok; tok.classList.add('dragging'); e.dataTransfer.setData('text',tok.dataset.w); });
    tok.addEventListener('dragend', ()=>tok.classList.remove('dragging'));
    // --- touch drag ---
    tok.addEventListener('touchstart', e=>{ dragWord=tok; tok.classList.add('dragging'); }, {passive:true});
  });

  function tryDrop(slot){
    if(!dragWord || dragWord.classList.contains('placed')) return;
    const ok = slot.dataset.ans === dragWord.dataset.w;
    if(ok){
      sndRight();
      slot.classList.add('correct');
      slot.innerHTML += `<span class="answer">${dragWord.dataset.w}</span>`;
      dragWord.classList.add('placed');
      solved++;
      addGems(2);
      if(solved===total){ setTimeout(()=>levelComplete('match', lvl, MATCH_LEVELS().length, 3), 450); }
    } else {
      sndWrong();
      recordMistake('match', slot.dataset.ans);
      slot.style.animation='shake .3s'; setTimeout(()=>slot.style.animation='',300);
      toast('Try again! 💭');
    }
    dragWord && dragWord.classList.remove('dragging');
    dragWord=null;
  }

  screen().querySelectorAll('.drop-slot').forEach(slot=>{
    slot.addEventListener('dragover', e=>{ e.preventDefault(); slot.classList.add('over'); });
    slot.addEventListener('dragleave', ()=>slot.classList.remove('over'));
    slot.addEventListener('drop', e=>{ e.preventDefault(); slot.classList.remove('over'); tryDrop(slot); });
    // touch: tap slot after tapping word
    slot.addEventListener('touchend', e=>{ e.preventDefault(); tryDrop(slot); }, {passive:false});
  });
}

/* =========================================================
   MODE 2 — FILL IN THE BLANK STORY
   ========================================================= */
function renderFill(lvl){
  currentLevel = lvl;
  const story = FILL_LEVELS()[lvl];
  // build blanks list
  const blanks = story.parts.filter(p=>typeof p==='object');
  let cur=0, correct=0;

  function storyHTML(){
    let h=''; let bi=0;
    story.parts.forEach(p=>{
      if(typeof p==='string'){ h+=p; }
      else{
        const filled = p._filled;
        h+=`<span class="blank" id="blank${bi}">${filled?filled:'＿＿＿'}</span>`;
        bi++;
      }
    });
    return h;
  }
  function optionsHTML(){
    if(cur>=blanks.length) return '';
    const b=blanks[cur];
    const opts=shuffle(b.opts);
    return `<p class="prompt-big">Choose the best word ✨</p>
      <p class="hintline">Blank ${cur+1} of ${blanks.length}</p>
      <div class="options">
        ${opts.map(o=>`<button class="opt" onclick="window._pick('${o}')">${o}</button>`).join('')}
      </div>`;
  }
  function draw(){
    go(`
      ${header('📖 Finish the Story', 'fill')}
      <div class="panel">
        <h3 class="center" style="color:var(--pink-deep);">${story.title}</h3>
        <div class="qstory">${storyHTML()}</div>
        <div id="optzone">${optionsHTML()}</div>
      </div>
    `);
  }
  window._pick = (choice)=>{
    const b=blanks[cur];
    if(choice===b.a){
      sndRight(); addGems(2); correct++;
      b._filled = choice;
      cur++;
      if(cur>=blanks.length){
        draw();
        setTimeout(()=>levelComplete('fill', lvl, FILL_LEVELS().length, correct===blanks.length?3:2), 500);
      } else { draw(); toast('Lovely! ✨'); }
    } else {
      sndWrong(); recordMistake('fill', b.a); toast('Hmm, not quite! 💭','Pick the word that fits best');
    }
  };
  draw();
}

/* =========================================================
   MODE 3 — STORY BUILDER
   ========================================================= */
function renderBuild(lvl){
  currentLevel = lvl;
  const L = BUILD_LEVELS()[lvl];
  const slots = L.template.filter(t=>typeof t==='object');
  const picks = {}; // slotIndex -> word
  let activeSlot = 0;

  function slotId(i){ return 'slot'+i; }
  function templateHTML(){
    let h=''; let si=0;
    L.template.forEach(t=>{
      if(typeof t==='string'){ h+=t; }
      else{
        const i=si; const val=picks[i];
        h+=`<span class="pick-slot ${val?'filled':''} ${i===activeSlot?'active':''}" id="${slotId(i)}" onclick="window._setActive(${i})">${val?val:'＿＿＿'}</span>`;
        si++;
      }
    });
    return h;
  }
  function bankHTML(){
    if(activeSlot>=slots.length) return `<p class="center reward">Your sentence is ready! 🎉</p>`;
    const cat = slots[activeSlot].slot;
    const words = L.banks[cat];
    return `<div class="bank-title">Pick a word for blank ${activeSlot+1} of ${slots.length}:</div>
      <div class="bank">
        ${words.map(w=>`<button class="opt" onclick="window._fill('${w}')">${w}</button>`).join('')}
      </div>`;
  }
  function finalHTML(){
    if(Object.keys(picks).length<slots.length) return '';
    let s=''; let si=0;
    L.template.forEach(t=>{ if(typeof t==='string') s+=t; else { s+=picks[si]; si++; } });
    return `<div class="builder-final">📜 ${s}</div>
      <div class="row">
        <button class="btn purple" onclick="window._again()">🔁 Build Again</button>
        <button class="btn primary big" onclick="window._done()">✅ I Love It!</button>
      </div>`;
  }
  function draw(){
    go(`
      ${header('🪄 Build a Sentence', 'build')}
      <div class="panel">
        <h3 class="center" style="color:var(--pink-deep);">${L.title}</h3>
        <p class="hintline">Tap a blank, then pick a word. Make it as silly as you like! 🦄</p>
        <div class="builder-template">${templateHTML()}</div>
        <div id="bankzone">${bankHTML()}</div>
        <div id="finalzone">${finalHTML()}</div>
      </div>
    `);
  }
  window._setActive=(i)=>{ activeSlot=i; sndPop(); draw(); };
  window._fill=(w)=>{
    sndRight(); addGems(1);
    picks[activeSlot]=w;
    // move to next empty slot
    let next = activeSlot;
    for(let k=0;k<slots.length;k++){ if(picks[k]===undefined){ next=k; break; } if(k===slots.length-1) next=slots.length; }
    activeSlot = next;
    draw();
  };
  window._again=()=>{ renderBuild(lvl); };
  window._done=()=>{
    confettiBurst();
    levelComplete('build', lvl, BUILD_LEVELS().length, 3, '🌟 What a creative sentence!');
  };
  draw();
}

/* =========================================================
   MODE 4 — WORD TREASURE HUNT (synonyms)
   ========================================================= */
function renderHunt(lvl){
  currentLevel = lvl;
  const L = HUNT_LEVELS()[lvl];
  let qi=0, correct=0;

  function draw(){
    if(qi>=L.qs.length){ levelComplete('hunt', lvl, HUNT_LEVELS().length, correct===L.qs.length?3:2); return; }
    const q=L.qs[qi];
    const opts=shuffle(q.opts);
    go(`
      ${header('💎 Treasure Hunt', 'hunt')}
      <div class="panel">
        <h3 class="center" style="color:var(--pink-deep);">${L.theme}</h3>
        <p class="hintline">Question ${qi+1} of ${L.qs.length} — find the word that means almost the same!</p>
        <p class="prompt-big">${q.w}</p>
        <div class="options">
          ${opts.map(o=>`<button class="opt" onclick="window._guess(this,'${o}')">${o}</button>`).join('')}
        </div>
      </div>
    `);
  }
  window._guess=(btn,choice)=>{
    const q=L.qs[qi];
    if(choice===q.a){
      btn.classList.add('right'); sndRight(); addGems(2); correct++;
      setTimeout(()=>{ qi++; draw(); }, 600);
    } else {
      btn.classList.add('wrong'); sndWrong(); recordMistake('hunt', q.w); toast('Keep hunting! 🔎');
      btn.disabled=true;
    }
  };
  draw();
}

function renderMean(lvl){
  currentLevel = lvl;
  const L = MEAN_LEVELS()[lvl];
  let qi=0, correct=0;
  function draw(){
    if(qi>=L.qs.length){ levelComplete('mean', lvl, MEAN_LEVELS().length, correct===L.qs.length?3:2); return; }
    const q=L.qs[qi];
    const opts=shuffle(q.opts);
    go(`
      ${header('📚 Word Meanings', 'mean')}
      <div class="panel">
        <h3 class="center" style="color:var(--pink-deep);">${L.theme}</h3>
        <p class="hintline">Question ${qi+1} of ${L.qs.length} — what does this word mean?</p>
        <p class="prompt-big">${q.w}</p>
        <div class="options">
          ${opts.map(o=>`<button class="opt small-opt" onclick="window._mguess(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
        </div>
      </div>
    `);
  }
  window._mguess=(btn,choice)=>{
    const q=L.qs[qi];
    if(choice===q.a){ btn.classList.add('right'); sndRight(); addGems(2); correct++; setTimeout(()=>{ qi++; draw(); },650); }
    else { btn.classList.add('wrong'); sndWrong(); recordMistake('mean', q.w); toast('Try again 📖'); btn.disabled=true; }
  };
  draw();
}

function renderIdiom(lvl){
  currentLevel = lvl;
  const L = IDIOM_LEVELS()[lvl];
  let qi=0, correct=0;
  function draw(){
    if(qi>=L.qs.length){ levelComplete('idiom', lvl, IDIOM_LEVELS().length, correct===L.qs.length?3:2); return; }
    const q=L.qs[qi];
    const opts=shuffle(q.opts);
    go(`
      ${header('🏝️ Idiom Island', 'idiom')}
      <div class="panel">
        <h3 class="center" style="color:var(--pink-deep);">${L.theme}</h3>
        <p class="hintline">Question ${qi+1} of ${L.qs.length} — what does this idiom really mean?</p>
        <p class="prompt-big" style="font-style:italic;">“${q.w}”</p>
        <div class="options">
          ${opts.map(o=>`<button class="opt small-opt" onclick="window._iguess(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
        </div>
      </div>
    `);
  }
  window._iguess=(btn,choice)=>{
    const q=L.qs[qi];
    if(choice===q.a){ btn.classList.add('right'); sndRight(); addGems(2); correct++; setTimeout(()=>{ qi++; draw(); },650); }
    else { btn.classList.add('wrong'); sndWrong(); recordMistake('idiom', q.w); toast('Have another guess 🌴'); btn.disabled=true; }
  };
  draw();
}

function levelComplete(key, lvl, total, starsEarned, customMsg){
  sndWin(); confettiBurst();
  // record progress
  const stg=State.currentStage;
  const wasNewLevel = (State.progress[stg][key] <= lvl);
  if(wasNewLevel) State.progress[stg][key] = lvl+1;
  if(!State.levelStars[stg][key]) State.levelStars[stg][key]={};
  if((State.levelStars[stg][key][lvl]||0) < starsEarned) State.levelStars[stg][key][lvl]=starsEarned;
  // Arcade charge for 90%+ scores (= 3 stars on Reia's short levels)
  let earnedArcade = false;
  if(starsEarned >= 3){
    State.arcadeCharges = (State.arcadeCharges || 0) + 1;
    earnedArcade = true;
  }
  recomputeStars(); updateStats();
  // award a sticker (first unowned)
  let newSticker=null;
  const milestoneHit = wasNewLevel && (State.progress[stg][key] % 5 === 0);
  if(milestoneHit){
    for(const s of STICKERS){ if(!State.stickers.includes(s)){ State.stickers.push(s); newSticker=s; break; } }
  }
  saveState();

  const isLast = (lvl+1>=total);
  const next = lvl+1;
  go(`
    <div class="panel center">
      <h1>🎉 Level Complete! 🎉</h1>
      <div class="stars-big">${'⭐'.repeat(starsEarned)}${'☆'.repeat(3-starsEarned)}</div>
      <p class="reward">${customMsg||'You are a Word Star!'}</p>
      ${newSticker?`<p style="font-size:18px;">New sticker unlocked: <span style="font-size:30px;">${newSticker}</span></p>`:''}
      ${earnedArcade?`<p class="reward" style="background:linear-gradient(90deg,#ffe27a,#ff9ad6,#a98cf0); -webkit-background-clip:text; background-clip:text; color:transparent; font-size:22px;">🎮 +1 Unicorn Arcade play unlocked!</p>`:''}
      <p style="color:#9a7bbd;">💎 Gems: ${State.gems} &nbsp; ⭐ Stars: ${State.stars}</p>
      <div class="row">
        <button class="btn backbtn" onclick="home()">🏠 Home</button>
        ${!isLast?`<button class="btn primary big" onclick="startNext('${key}',${next})">Next Level ➡️</button>`
                 :`<button class="btn purple big" onclick="home()">🏆 All Done!</button>`}
      </div>
      ${isLast?`<p class="reward" style="margin-top:10px;">🏆 You finished every level in this game! Amazing!</p>`:''}
    </div>
  `);
}

}

function recordMistake(gameKey, word){
  if(!word) return;
  const k = gameKey + '|' + word;
  State.mistakes = State.mistakes || {};
  State.mistakes[k] = (State.mistakes[k]||0) + 1;
  saveState();
}

function wordOfTheDay(){
  const stg = State.currentStage;
  const pool = MEAN_LEVELS_BY_STAGE[stg].flatMap(L=>L.qs);
  const seen = new Set();
  const unique = pool.filter(q=>{ if(seen.has(q.w))return false; seen.add(q.w); return true; });
  if(unique.length===0) return null;
  const s = new Date().toISOString().slice(0,10) + ':' + stg;
  let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))>>>0; }
  const pick = unique[h % unique.length];
  return { w: pick.w, d: pick.a };
}

      ctx.beginPath();
      ctx.moveTo(o.x,o.y); ctx.lineTo(o.x+11,o.y+22); ctx.lineTo(o.x+22,o.y);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    },
    hit: (o,cube) => boxHitTriangle(cube.x,cube.y,cube.w,cube.h, o.x,o.y,22,22),
    floor: () => null,
  },
  saw: {
    width: o => o.r*2+4,
    spawn: (o,x) => ({...o, x, angle:0}),
    tick: o => { o.angle += 0.32; },
    render: (o,ctx) => {
      const cx=o.x+o.r, cy=o.y;
      ctx.save();
      ctx.translate(cx,cy); ctx.rotate(o.angle);
      // glittery pink star/gear
      const g = ctx.createRadialGradient(0,0,2,0,0,o.r);
      g.addColorStop(0,'#ffd36b'); g.addColorStop(1,'#ff5fb4');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0,0,o.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff';
      for(let i=0;i<8;i++){
        ctx.save(); ctx.rotate(i*Math.PI/4);
        ctx.beginPath();
        ctx.moveTo(0,-o.r-5);
        ctx.lineTo(-3,-o.r+3);
        ctx.lineTo(3,-o.r+3);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(0,0,o.r,0,Math.PI*2); ctx.stroke();
      // sparkle center
      ctx.fillStyle='#ffe27a'; ctx.shadowColor='#ffd36b'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.restore();
    },
    hit: (o,cube) => {
      const cx=o.x+o.r, cy=o.y;
      const ccx=cube.x+cube.w/2, ccy=cube.y+cube.h/2;
      const dx=ccx-cx, dy=ccy-cy;
      return Math.sqrt(dx*dx+dy*dy) < o.r + cube.w/2 - 4;
    },
    floor: () => null,
  },
};

function arcadeAvailable(){ return (State.arcadeCharges||0) > 0; }

function openArcade(){
  if(!arcadeAvailable()){ toast('🔒 Score 100% to earn a play!'); return; }
  State.arcadeCharges--;
  saveState();
  $('#arcadeOverlay').classList.add('show');
  startArcade();
}
function closeArcade(){
  cancelAnimationFrame(arcadeRAF);
  arcade = null;
  $('#arcadeOverlay').classList.remove('show');
  home();
}

function startArcade(){
  const canvas = $('#arcadeCanvas');
  const targetW = Math.min(Math.max(window.innerWidth*0.92, 600), 1200);
  const targetH = 300;
  canvas.width = Math.round(targetW);
  canvas.height = targetH;

  const stageIdx = Math.min((State.arcadeStage||1)-1, ARCADE_MAX_STAGE-1);
  const cfg = ARCADE_STAGES[stageIdx];

  arcadeCtx = canvas.getContext('2d');
  arcade = {
    w: canvas.width, h: canvas.height,
    ground: canvas.height - 32,
    cube: { x:110, y: canvas.height - 32 - 30, w:30, h:30, vy:0, onGround:true, rot:0 },
    gravity: 0.85,
    jumpV: -13,
    ringJumpV: -16,
    speed: cfg.speed,
    obstacles: [],
    nextSpawn: cfg.sMax + 40,
    activeRing: null,
    t: 0, score: 0,
    dead: false, survived: false,
    stage: State.arcadeStage,
    cfg,
    startTime: performance.now(),
    timeLimitSec: ARCADE_DURATION_SEC,
  };
  $('#arcadeScore').textContent = 'STAGE ' + arcade.stage + ' · ' + ARCADE_DURATION_SEC + 's';
  cancelAnimationFrame(arcadeRAF);
  arcadeLoop();
}

function arcadeJump(){
  if(!arcade || arcade.dead) return;
  if(arcade.activeRing && !arcade.activeRing.used){
    arcade.cube.vy = arcade.ringJumpV;
    arcade.cube.onGround = false;
    arcade.activeRing.used = true;
    arcade.activeRing.hot = 8;
    return;
  }
  if(arcade.cube.onGround){
    arcade.cube.vy = arcade.jumpV;
    arcade.cube.onGround = false;
  }
}

function spawnArcadeObstacle(){
  const pool = arcade.cfg.pool;
  const key = pool[Math.floor(Math.random()*pool.length)];
  const t = OBS[key];
  const handler = OBSTACLE_TYPES[t.type];
  const o = handler.spawn({...t}, arcade.w + 30, arcade.ground);
  arcade.obstacles.push(o);
}

function computeFloor(cube){
  let floor = arcade.ground;
  for(const o of arcade.obstacles){
    const h = OBSTACLE_TYPES[o.type];
    if(!h.floor) continue;
    const f = h.floor(o, cube);
    if(f !== null && f < floor && cube.y + cube.h <= f + 4) floor = f;
  }
  return floor;
}

// Input handlers (registered once)
document.addEventListener('keydown', e => {
  if(e.code === 'Space' && $('#arcadeOverlay') && $('#arcadeOverlay').classList.contains('show')){
    e.preventDefault(); arcadeJump();
  }
});
document.addEventListener('touchstart', e => {
  if($('#arcadeOverlay') && $('#arcadeOverlay').classList.contains('show') && e.target.id === 'arcadeCanvas'){
    e.preventDefault(); arcadeJump();
  }
}, { passive:false });
document.addEventListener('mousedown', e => {
  if(e.target.id === 'arcadeCanvas') arcadeJump();
});

function renderArcadeBackground(){
  const a = arcade, ctx = arcadeCtx;
  // stage-tinted pastel sky
  const grad = ctx.createLinearGradient(0,0,0,a.h);
  grad.addColorStop(0, a.cfg.bg[0]);
  grad.addColorStop(1, a.cfg.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,a.w,a.h);

  // soft brick wallpaper
  ctx.strokeStyle='rgba(255,255,255,0.35)';
  ctx.lineWidth=1;
  const brickW=80, brickH=50;
  const offX = (a.t*a.speed*0.3) % brickW;
  for(let row=0; row*brickH < a.ground; row++){
    const y = row*brickH;
    const rowOff = row%2===1 ? brickW/2 : 0;
    for(let x = -brickW - offX + rowOff; x < a.w + brickW; x += brickW){
      ctx.strokeRect(x, y, brickW, brickH);
    }
  }

  // lavender mountain silhouettes
  ctx.fillStyle='rgba(169,140,240,0.30)';
  ctx.beginPath();
  ctx.moveTo(0,a.ground);
  const mtnOff = (a.t*a.speed*0.15) % 100;
  for(let x=-mtnOff; x < a.w + 100; x += 50){
    const peak = a.ground - 20 - Math.abs(Math.sin(x*0.013)) * 24;
    ctx.lineTo(x+25, peak);
    ctx.lineTo(x+50, a.ground);
  }
  ctx.lineTo(a.w+100, a.ground);
  ctx.closePath();
  ctx.fill();

  // rainbow ground line
  const gg = ctx.createLinearGradient(0,a.ground,a.w,a.ground);
  gg.addColorStop(0,'#ff9ad6'); gg.addColorStop(0.5,'#a98cf0'); gg.addColorStop(1,'#79c4ff');
  ctx.fillStyle = gg;
  ctx.shadowColor='#ff9ad6'; ctx.shadowBlur=16;
  ctx.fillRect(0, a.ground, a.w, 4);
  ctx.shadowBlur = 0;

  // floating sparkle bg specks
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<6;i++){
    const sx = (i*180 - (a.t*a.speed*0.4)) % a.w;
    const x = sx < 0 ? sx + a.w : sx;
    const y = 30 + (i*47)%140;
    ctx.beginPath(); ctx.arc(x, y, 1.6, 0, Math.PI*2); ctx.fill();
  }
}

function drawUnicornCube(ctx, cube){
  // rotating pink unicorn cube
  const cx = cube.x + cube.w/2, cy = cube.y + cube.h/2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(cube.rot);
  // pink rounded body
  const g = ctx.createLinearGradient(-cube.w/2,-cube.h/2,cube.w/2,cube.h/2);
  g.addColorStop(0,'#ffb8de'); g.addColorStop(1,'#ff5fb4');
  ctx.fillStyle = g;
  const r = 7;
  const x=-cube.w/2, y=-cube.h/2, w=cube.w, h=cube.h;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y, x+w,y+h, r);
  ctx.arcTo(x+w,y+h, x,y+h, r);
  ctx.arcTo(x,y+h, x,y, r);
  ctx.arcTo(x,y, x+w,y, r);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  // unicorn face
  ctx.fillStyle='#5b3b7a';
  ctx.beginPath(); ctx.arc(-5,-2,2.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-2,2.2,0,Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle='#5b3b7a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,4,4,0,Math.PI); ctx.stroke();
  // horn
  ctx.fillStyle='#ffe27a';
  ctx.shadowColor='#ffe27a'; ctx.shadowBlur=6;
  ctx.beginPath();
  ctx.moveTo(0,-cube.h/2);
  ctx.lineTo(-3,-cube.h/2-6);
  ctx.lineTo(3,-cube.h/2-6);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  // rainbow mane stripe
  const stripes=['#ff5fb4','#ffd36b','#79e0c0','#79c4ff'];
  for(let i=0;i<stripes.length;i++){
    ctx.fillStyle=stripes[i];
    ctx.fillRect(-cube.w/2-3, -cube.h/2+4+i*5, 4, 4);
  }
  ctx.restore();
}

function arcadeLoop(){
  const a = arcade; if(!a) return;
  const ctx = arcadeCtx;
  ctx.clearRect(0,0,a.w,a.h);
  renderArcadeBackground();

  const elapsedSec = (performance.now() - a.startTime) / 1000;
  const timeLeft = Math.max(0, a.timeLimitSec - elapsedSec);

  if(!a.dead){
    a.t++;
    a.score = Math.floor(a.t/6);

    if(elapsedSec >= a.timeLimitSec){
      a.survived = true; a.dead = true;
      if(State.arcadeStage < ARCADE_MAX_STAGE) State.arcadeStage++;
      if(a.stage > (State.arcadeBestStage||1)) State.arcadeBestStage = a.stage;
      saveState();
    }

    // physics
    a.cube.vy += a.gravity;
    a.cube.y += a.cube.vy;
    const floor = computeFloor(a.cube);
    if(a.cube.y >= floor - a.cube.h){
      a.cube.y = floor - a.cube.h;
      a.cube.vy = 0; a.cube.onGround = true; a.cube.rot = 0;
    } else {
      a.cube.onGround = false;
      a.cube.rot += 0.18;
    }
    if(a.cube.y > a.h + 50) a.dead = true;

    // spawn
    a.nextSpawn--;
    if(a.nextSpawn <= 0 && !a.survived){
      spawnArcadeObstacle();
      const span = a.cfg.sMax - a.cfg.sMin;
      a.nextSpawn = a.cfg.sMin + Math.floor(Math.random()*span);
    }

    // move + tick
    a.obstacles.forEach(o => {
      o.x -= a.speed;
      const h = OBSTACLE_TYPES[o.type];
      if(h.tick) h.tick(o);
    });
    a.obstacles = a.obstacles.filter(o => {
      const w = OBSTACLE_TYPES[o.type].width(o);
      return o.x + w > -10;
    });

    // ring overlap
    a.activeRing = null;
    for(const o of a.obstacles){
      if(o.type !== 'ring' || o.used) continue;
      if(OBSTACLE_TYPES.ring.overlap(o, a.cube)){
        a.activeRing = o; o.hot = 6; break;
      }
    }
    a.obstacles.forEach(o => { if(o.hot > 0) o.hot--; });

    // collision
    for(const o of a.obstacles){
      const h = OBSTACLE_TYPES[o.type];
      if(h.hit(o, a.cube, a.ground)){ a.dead = true; break; }
    }
  }

  // render obstacles
  const drawOrder = ['cspike','pillar','platform','spike','saw','ring'];
  drawOrder.forEach(type => {
    a.obstacles.filter(o => o.type === type).forEach(o => {
      OBSTACLE_TYPES[o.type].render(o, ctx, a.ground);
    });
  });

  // player
  drawUnicornCube(ctx, a.cube);

  // HUD
  ctx.fillStyle='rgba(91,59,122,0.95)';
  ctx.font='bold 18px "Baloo 2","Comic Sans MS",sans-serif';
  ctx.shadowColor='rgba(255,255,255,0.7)'; ctx.shadowBlur=6;
  ctx.textAlign='left';
  ctx.fillText('STAGE ' + a.stage, 14, 24);
  ctx.textAlign='right';
  ctx.fillStyle = timeLeft < 10 ? '#ff2e63' : '#8b6ff0';
  ctx.fillText(timeLeft.toFixed(1) + 's', a.w - 14, 24);
  ctx.fillStyle='rgba(91,59,122,0.7)';
  ctx.font='bold 14px "Baloo 2","Comic Sans MS",sans-serif';
  ctx.fillText('Score ' + a.score, a.w - 14, 44);
  ctx.shadowBlur = 0;
  ctx.textAlign='left';
  $('#arcadeScore').textContent = 'STAGE ' + a.stage + ' · ' + timeLeft.toFixed(1) + 's · Score ' + a.score;

  // progress bar
  const progress = Math.min(1, elapsedSec / a.timeLimitSec);
  ctx.fillStyle='rgba(255,255,255,0.40)';
  ctx.fillRect(0,0,a.w,4);
  ctx.fillStyle = a.survived ? '#34c79b' : (timeLeft < 10 ? '#ff5fb4' : '#a98cf0');
  ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur=8;
  ctx.fillRect(0, 0, a.w*progress, 4);
  ctx.shadowBlur = 0;

  if(a.dead){
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillRect(0,0,a.w,a.h);
    if(a.survived){
      ctx.fillStyle='#34c79b';
      ctx.font='bold 40px "Baloo 2","Comic Sans MS",sans-serif';
      ctx.textAlign='center';
      ctx.shadowColor='#34c79b'; ctx.shadowBlur=18;
      ctx.fillText('STAGE ' + a.stage + ' CLEARED! ✨', a.w/2, a.h/2 - 24);
      ctx.font='bold 18px "Baloo 2","Comic Sans MS",sans-serif';
      ctx.fillStyle='#5b3b7a'; ctx.shadowBlur=0;
      if(a.stage < ARCADE_MAX_STAGE){
        ctx.fillText('Next play unlocks STAGE ' + (a.stage+1), a.w/2, a.h/2 + 8);
      } else {
        ctx.fillText('🏆 You cleared the final stage. Royal Legend!', a.w/2, a.h/2 + 8);
      }
      ctx.fillStyle='#9a7bbd';
      ctx.fillText('Score: ' + a.score, a.w/2, a.h/2 + 32);
    } else {
      ctx.fillStyle='#ff5fb4';
      ctx.font='bold 40px "Baloo 2","Comic Sans MS",sans-serif';
      ctx.textAlign='center';
      ctx.shadowColor='#ff5fb4'; ctx.shadowBlur=18;
      ctx.fillText('OH NO! 💔', a.w/2, a.h/2 - 24);
      ctx.font='bold 18px "Baloo 2","Comic Sans MS",sans-serif';
      ctx.fillStyle='#5b3b7a'; ctx.shadowBlur=0;
      ctx.fillText('STAGE ' + a.stage + ' — retry next play', a.w/2, a.h/2 + 8);
      ctx.fillStyle='#9a7bbd';
      ctx.fillText('Earn another play by scoring 100% on any level', a.w/2, a.h/2 + 32);
    }
    ctx.textAlign='left';
  }

  arcadeRAF = requestAnimationFrame(arcadeLoop);
}

/* start */
loadState();
updateStats();
home();
</script>
