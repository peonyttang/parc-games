<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Paxton's Chinese Dash · P4 华文闯关</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ===========================================================
     GEOMETRY DASH–STYLE THEME
  =========================================================== */
  :root{
    --font-title: 'Russo One', 'Noto Sans SC', system-ui, sans-serif;
    --font-body:  'Noto Sans SC', system-ui, -apple-system, sans-serif;
    --bg:#0a0a14;
    --bg2:#10102a;
    --grid:#1d1d3a;
    --neon-cyan:#00f0ff;
    --neon-magenta:#ff00d4;
    --neon-yellow:#ffe600;
    --neon-green:#39ff14;
    --neon-orange:#ff8c00;
    --neon-purple:#b14aff;
    --neon-red:#ff2e63;
    --white:#ffffff;
    --good:#39ff14;
    --bad:#ff2e63;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body { height:100%; }
  body{
    font-family: var(--font-body);
    background:var(--bg);
    color:var(--white);
    overflow-x:hidden;
    overflow-y:auto;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }
  /* Apply Russo One to titles & UI emphasis (Chinese chars fall back to Noto Sans SC) */
  .topbar .logo, .welcome h1, .welcome p.tag,
  .game-tile h3, .game-tile .en, .game-tile .play-pill, .game-tile .gnum,
  .game-title, .question-num, .results h2, .results .score-big,
  .btn, .next-btn, .back-btn, .stat, .arcade-overlay h2,
  .notice-title, .option-letter, .unlock-banner, .char-card .pinyin {
    font-family: var(--font-title);
    letter-spacing: 1.5px;
  }
  /* Animated grid background */
  .bg-grid{
    position:fixed; inset:0; z-index:-2;
    background:
      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
  }
  .bg-grid::before{
    content:""; position:absolute; inset:-50%;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: perspective(600px) rotateX(60deg) translateZ(0);
    animation: grid-scroll 8s linear infinite;
    opacity:0.65;
  }
  @keyframes grid-scroll{
    from{ transform: perspective(600px) rotateX(60deg) translateY(0); }
    to  { transform: perspective(600px) rotateX(60deg) translateY(60px); }
  }
  .bg-blobs{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
  }
  .blob{
    position:absolute;
    width:300px; height:300px;
    border-radius:50%;
    filter: blur(80px);
    opacity:0.45;
    animation: drift 16s ease-in-out infinite alternate;
  }
  .blob.b1{ background:var(--neon-cyan);    left:-80px; top:10%; }
  .blob.b2{ background:var(--neon-magenta); right:-80px; top:40%; animation-delay:-4s; }
  .blob.b3{ background:var(--neon-purple);  left:30%;   bottom:-100px; animation-delay:-8s; }
  @keyframes drift{
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(60px,-40px) scale(1.15); }
  }

  /* ===========================================================
     HEADER
  =========================================================== */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px;
    backdrop-filter: blur(6px);
    background: rgba(10,10,20,0.55);
    border-bottom: 2px solid var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,240,255,0.35);
    position:sticky; top:0; z-index:50;
  }
  .topbar .logo{
    display:flex; align-items:center; gap:10px;
    font-weight: bold; letter-spacing:1px;
    color:var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
  }
  .cube-icon{
    width:28px; height:28px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    border:2px solid white;
    box-shadow: 0 0 12px var(--neon-cyan), inset 0 0 8px rgba(255,255,255,0.4);
    transform: rotate(45deg);
  }
  .topbar .stats{
    display:flex; gap:14px; flex-wrap:wrap; justify-content:flex-end;
  }
  .stat{
    display:flex; align-items:center; gap:6px;
    background: rgba(255,255,255,0.06);
    padding:6px 10px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.15);
    font-size:14px;
  }
  .stat .num{ color:var(--neon-yellow); font-weight:bold; text-shadow:0 0 6px var(--neon-yellow); }
  .stat .icon{ font-size:16px; }
  .back-btn{
    background:transparent; color:var(--neon-cyan);
    border:2px solid var(--neon-cyan);
    padding:6px 12px; border-radius:6px; cursor:pointer;
    font-weight:bold;
    text-shadow:0 0 6px var(--neon-cyan);
    box-shadow:0 0 8px rgba(0,240,255,0.4);
  }
  .back-btn:hover{ background: rgba(0,240,255,0.1); }

  /* ===========================================================
     HOMEPAGE
  =========================================================== */
  .home{
    max-width:1100px; margin:0 auto;
    padding:30px 18px 60px;
  }
  .welcome{
    text-align:center; margin-bottom:30px;
  }
  .welcome h1{
    font-size: clamp(34px, 6vw, 58px);
    letter-spacing:2px;
    color:var(--white);
    text-shadow:
      0 0 10px var(--neon-cyan),
      0 0 25px var(--neon-cyan),
      0 0 50px var(--neon-magenta);
    animation: pulse-glow 2s ease-in-out infinite alternate;
  }
  @keyframes pulse-glow{
    from{ text-shadow:0 0 8px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-magenta); }
    to  { text-shadow:0 0 18px var(--neon-magenta), 0 0 35px var(--neon-magenta), 0 0 60px var(--neon-cyan); }
  }
  .welcome p.tag{
    color:var(--neon-yellow);
    text-shadow:0 0 8px var(--neon-yellow);
    margin-top:8px; letter-spacing:3px;
    font-size:14px;
  }
  .welcome p.sub{
    color:#ccc; margin-top:14px; font-size:16px;
  }

  .games-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap:18px;
    margin-top:20px;
  }
  .game-tile{
    position:relative;
    padding:22px 18px 22px;
    border-radius:14px;
    background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    border: 2px solid;
    cursor:pointer;
    overflow:hidden;
    transition: transform .15s ease, box-shadow .15s ease;
    min-height:170px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .game-tile:hover{ transform: translateY(-3px) scale(1.02); }
  .game-tile .gnum{
    position:absolute; top:8px; right:12px;
    font-size:14px; opacity:0.5; font-weight:bold;
  }
  .game-tile h3{
    font-size:22px; margin-bottom:4px;
    text-shadow:0 0 8px currentColor;
  }
  .game-tile .en{
    font-size:13px; color:#ccc; margin-bottom:10px;
  }
  .game-tile .desc{ font-size:14px; color:#ddd; line-height:1.4; flex-grow:1; }
  .game-tile .tile-foot{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:14px; font-size:13px;
  }
  .game-tile .stars{ color:var(--neon-yellow); text-shadow:0 0 6px var(--neon-yellow); letter-spacing:2px; }
  .game-tile .play-pill{
    background: rgba(255,255,255,0.1);
    padding:4px 10px; border-radius:20px;
    border:1px solid currentColor;
  }
  /* Color variants */
  .gt-1{ color:var(--neon-cyan); border-color:var(--neon-cyan); box-shadow: 0 0 16px rgba(0,240,255,0.35); }
  .gt-2{ color:var(--neon-magenta); border-color:var(--neon-magenta); box-shadow: 0 0 16px rgba(255,0,212,0.35); }
  .gt-3{ color:var(--neon-yellow); border-color:var(--neon-yellow); box-shadow: 0 0 16px rgba(255,230,0,0.35); }
  .gt-4{ color:var(--neon-green); border-color:var(--neon-green); box-shadow: 0 0 16px rgba(57,255,20,0.35); }
  .gt-5{ color:var(--neon-orange); border-color:var(--neon-orange); box-shadow: 0 0 16px rgba(255,140,0,0.35); }
  .gt-6{ color:var(--neon-purple); border-color:var(--neon-purple); box-shadow: 0 0 16px rgba(177,74,255,0.35); }

  /* Cube mascot on homepage */
  .mascot{
    width:80px; height:80px; margin: 8px auto 18px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    border:4px solid white;
    box-shadow:
      0 0 18px var(--neon-cyan),
      0 0 30px var(--neon-magenta),
      inset 0 0 12px rgba(255,255,255,0.4);
    border-radius:8px;
    position:relative;
    animation: hop 1.2s ease-in-out infinite;
  }
  @keyframes hop{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%   { transform: translateY(-10px) rotate(20deg); }
  }
  .mascot::before, .mascot::after{
    content:""; position:absolute;
    width:14px; height:14px; background:white; border-radius:50%;
    top:18px;
  }
  .mascot::before{ left:14px; }
  .mascot::after{  right:14px; }
  .mascot .mouth{
    position:absolute; left:25px; right:25px; bottom:18px; height:6px;
    background:#222; border-radius:4px;
  }

  /* ===========================================================
     GAME VIEW
  =========================================================== */
  .game-view{
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .game-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px; flex-wrap:wrap; gap:10px;
  }
  .game-title{
    font-size: clamp(22px, 4vw, 32px);
    text-shadow: 0 0 10px currentColor;
  }
  .progress-bar{
    height:10px; background:rgba(255,255,255,0.1); border-radius:8px;
    overflow:hidden; border:1px solid rgba(255,255,255,0.2);
    margin-bottom:20px;
  }
  .progress-fill{
    height:100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
    box-shadow:0 0 12px var(--neon-cyan);
    transition: width .3s ease;
  }
  .question-card{
    background: rgba(255,255,255,0.04);
    border:2px solid rgba(255,255,255,0.15);
    border-radius:14px;
    padding:24px 20px;
    margin-bottom:18px;
    backdrop-filter: blur(4px);
  }
  .question-num{
    color:var(--neon-yellow); font-weight:bold; font-size:14px;
    letter-spacing:2px;
    margin-bottom:10px;
    text-shadow:0 0 6px var(--neon-yellow);
  }
  .question-text{
    font-size: clamp(20px, 3.5vw, 26px);
    line-height:1.7;
    color:#fff;
  }
  .blank{
    display:inline-block; min-width:40px;
    border-bottom:3px solid var(--neon-yellow);
    margin: 0 4px; padding: 0 6px;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
  }
  .options{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .option{
    padding: 16px 12px;
    background: rgba(255,255,255,0.05);
    border:2px solid var(--neon-cyan);
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    font-size: clamp(18px, 3vw, 22px);
    color: #fff;
    transition: transform .1s ease, box-shadow .15s ease, background .15s ease;
    box-shadow: 0 0 10px rgba(0,240,255,0.2);
  }
  .option:hover{ transform: translateY(-2px); background: rgba(0,240,255,0.15); }
  .option.correct{
    background: rgba(57,255,20,0.2);
    border-color: var(--good);
    box-shadow: 0 0 18px var(--good);
    animation: pop 0.4s ease;
  }
  .option.wrong{
    background: rgba(255,46,99,0.2);
    border-color: var(--bad);
    box-shadow: 0 0 18px var(--bad);
    animation: shake 0.4s ease;
  }
  @keyframes pop{ 0%{transform:scale(1);} 50%{transform:scale(1.1);} 100%{transform:scale(1);} }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-8px); }
    75%{ transform:translateX(8px); }
  }
  .option-letter{
    display:inline-block; width:24px; height:24px; border-radius:50%;
    background:var(--neon-cyan); color:#000; font-weight:bold;
    line-height:24px; margin-right:8px; font-size:14px;
  }

  /* Tappable Chinese char */
  .han{
    cursor: help;
    border-bottom: 1px dotted rgba(255,255,255,0.3);
    transition: color .12s ease;
  }
  .han:hover{ color: var(--neon-cyan); text-shadow:0 0 6px var(--neon-cyan); }

  /* Feedback toast */
  .feedback{
    margin-top:14px; padding:12px 14px; border-radius:10px;
    font-size:16px; display:none;
  }
  .feedback.show{ display:block; animation: pop 0.3s ease; }
  .feedback.good{ background: rgba(57,255,20,0.15); border:1px solid var(--good); color: var(--good); }
  .feedback.bad { background: rgba(255,46,99,0.15); border:1px solid var(--bad);  color: var(--bad);  }

  /* Next button */
  .next-btn{
    width:100%; margin-top:16px;
    padding:14px; font-size:18px; font-weight:bold;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    border:none; border-radius:10px; color:white; cursor:pointer;
    text-shadow:0 0 6px rgba(0,0,0,0.5);
    box-shadow: 0 0 16px rgba(0,240,255,0.5);
    letter-spacing:2px;
  }
  .next-btn:hover{ box-shadow: 0 0 24px var(--neon-magenta); }

  /* Cloze passages */
  .cloze-passage{
    line-height:2.2;
    font-size: clamp(16px, 2.6vw, 20px);
    margin-bottom: 18px;
  }
  .cloze-blank{
    display:inline-block; min-width:100px;
    border-bottom:3px solid var(--neon-yellow);
    margin:0 3px; padding: 0 4px;
    color:var(--neon-yellow);
    cursor:pointer;
    transition: background .15s;
    text-align:center;
  }
  .cloze-blank.active{ background: rgba(255,230,0,0.15); }
  .cloze-blank.filled.correct{ color: var(--good); border-color:var(--good); }
  .cloze-blank.filled.wrong{ color: var(--bad); border-color:var(--bad); }
  .word-bank{
    display:flex; flex-wrap:wrap; gap:8px;
    padding:14px; background: rgba(255,255,255,0.04);
    border-radius:10px; margin-bottom:14px;
    border:1px dashed rgba(255,255,255,0.2);
  }
  .word-chip{
    padding:8px 14px;
    background: rgba(255,255,255,0.08);
    border:1px solid var(--neon-cyan);
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
  }
  .word-chip:hover{ background:rgba(0,240,255,0.15); }
  .word-chip.used{ opacity:0.3; pointer-events:none; }

  /* Reading passage */
  .reading-passage{
    background: rgba(255,255,255,0.04);
    padding:18px; border-radius:10px;
    line-height:2;
    font-size: clamp(15px, 2.5vw, 18px);
    margin-bottom:18px;
    border:1px solid rgba(255,255,255,0.1);
  }
  .notice-box{
    background: rgba(255,230,0,0.08);
    border: 2px dashed var(--neon-yellow);
    padding:18px;
    border-radius:12px;
    margin: 14px 0;
  }
  .notice-title{
    font-size:22px; text-align:center; color:var(--neon-yellow);
    text-shadow:0 0 8px var(--neon-yellow);
    margin-bottom:10px;
    letter-spacing:2px;
  }

  /* Results screen */
  .results{
    text-align:center; padding:30px 20px;
  }
  .results h2{
    font-size: clamp(28px, 5vw, 42px);
    margin-bottom: 10px;
    color:var(--neon-yellow);
    text-shadow:0 0 14px var(--neon-yellow);
  }
  .results .score-big{
    font-size: 80px; font-weight:bold;
    color: var(--neon-cyan);
    text-shadow: 0 0 18px var(--neon-cyan);
    margin: 16px 0;
  }
  .results .stars-display{
    font-size: 50px; letter-spacing: 10px;
    color: var(--neon-yellow);
    text-shadow:0 0 12px var(--neon-yellow);
    margin: 14px 0;
  }
  .star-empty{ color:#333; text-shadow:none; }
  .results .result-msg{
    margin: 12px 0 20px; color:#eee; font-size:18px;
  }
  .result-actions{
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  }
  .btn{
    padding:12px 22px; font-size:16px; font-weight:bold;
    border:none; border-radius:10px; cursor:pointer; letter-spacing:1px;
  }
  .btn-cyan{
    background: var(--neon-cyan); color:#000;
    box-shadow: 0 0 14px var(--neon-cyan);
  }
  .btn-magenta{
    background: var(--neon-magenta); color:#fff;
    box-shadow: 0 0 14px var(--neon-magenta);
  }
  .btn-yellow{
    background: var(--neon-yellow); color:#000;
    box-shadow: 0 0 14px var(--neon-yellow);
  }
  .btn-outline{
    background:transparent; color:#fff;
    border:2px solid #fff;
  }
  .unlock-banner{
    background: linear-gradient(135deg, var(--neon-yellow), var(--neon-orange));
    color:#000; padding:14px; border-radius:10px;
    margin: 16px 0; font-weight:bold;
    animation: pulse-glow 1.5s ease-in-out infinite alternate;
    box-shadow: 0 0 16px var(--neon-yellow);
  }

  /* ===========================================================
     CHARACTER POPUP
  =========================================================== */
  .char-modal{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.75);
    display:none; align-items:center; justify-content:center;
    z-index:100; padding:16px;
  }
  .char-modal.show{ display:flex; animation: fadeIn .15s ease; }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .char-card{
    background: var(--bg2);
    border: 2px solid var(--neon-cyan);
    border-radius:14px;
    padding:22px;
    max-width:420px; width:100%;
    box-shadow: 0 0 30px var(--neon-cyan);
    text-align:center;
    position:relative;
  }
  .char-card .closer{
    position:absolute; top:8px; right:14px;
    font-size:28px; cursor:pointer; color:#aaa;
  }
  .char-card .big-char{
    font-size: 90px;
    line-height:1;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan);
    margin: 10px 0 4px;
  }
  .char-card .pinyin{
    font-size: 24px;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
    margin-bottom: 10px;
  }
  .char-card .meaning{
    font-size: 17px; color:#fff;
    margin-bottom:12px;
  }
  .char-card .meaning b{ color:var(--neon-magenta); }
  .char-card .example{
    background: rgba(255,255,255,0.05);
    padding:10px; border-radius:8px;
    font-size:16px; color:#ddd; line-height:1.5;
    margin-bottom:14px;
  }
  .char-card .example .han{ color:var(--white); }
  .char-card .example-en{
    font-size:13px; color:#aaa; margin-top:4px; font-style:italic;
  }
  .char-card .audio-btn{
    background: var(--neon-magenta);
    color:white; border:none; border-radius:8px;
    padding:10px 20px; font-size:16px; cursor:pointer;
    box-shadow: 0 0 12px var(--neon-magenta);
    font-weight:bold;
  }
  .char-card .audio-btn:hover{ opacity:0.85; }
  .char-card .know-row{
    margin-top:14px; display:flex; gap:8px; justify-content:center;
  }
  .char-card .know-row button{
    padding:8px 16px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.05);
    color:#fff; cursor:pointer; font-size:14px;
  }
  .char-card .know-row button.know{ border-color: var(--good); color: var(--good); }
  .char-card .know-row button.learn{ border-color: var(--neon-yellow); color: var(--neon-yellow); }
  .char-card .hint{
    margin-top:14px; font-size:12px; color:#888;
  }

  /* ===========================================================
     ARCADE MINI-GAME
  =========================================================== */
  .arcade-overlay{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.9);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    z-index:90; padding:16px;
  }
  .arcade-overlay.show{ display:flex; }
  .arcade-overlay h2{
    color:var(--neon-yellow); text-shadow:0 0 12px var(--neon-yellow);
    font-size:32px; margin-bottom:6px; letter-spacing:2px;
  }
  .arcade-overlay p{ color:#ccc; margin-bottom:12px; }
  #arcadeCanvas{
    border:2px solid var(--neon-cyan);
    box-shadow: 0 0 24px var(--neon-cyan);
    background: var(--bg);
    display:block;
    max-width: 100%;
    touch-action: none;
  }
  .arcade-score{
    color:var(--neon-yellow); font-size:22px; margin:12px 0;
    text-shadow:0 0 8px var(--neon-yellow);
  }
  .arcade-controls{
    color:#aaa; font-size:14px; margin-top:8px;
  }

  /* Small screens */
  @media (max-width: 600px){
    .options{ grid-template-columns: 1fr; }

  .par-char-grid{

  =========================================================== */

    display: grid;

  .vault-lr-cell .vlr-stars{ color: var(--neon-yellow); text-shadow: 0 0 6px var(--neon-yellow); letter-spacing:2px; }

  /* Confetti */
  .confetti{
    position:fixed; pointer-events:none; top:-20px;
    width:8px; height:14px;
    z-index:200;
    animation: fall 1.6s linear forwards;
  }
  @keyframes fall{
    to{ transform: translateY(110vh) rotate(720deg); }
  }
</style>
</head>

<script>

function isLevelUnlocked(gameId, levelIdx){
  if(levelIdx === 0) return true;
  // unlocked if previous level has been cleared (any score recorded)
  const scores = state.levelScores?.[gameId] || [];
  return (scores[levelIdx-1] || 0) > 0;
}
function countLevelsCleared(){
  let n = 0;
  for(const gid in state.levelScores || {}){
    (state.levelScores[gid] || []).forEach(s => { if(s > 0) n++; });
  }
  return n;
}
function gameMastered(gameId){
  const stars = state.levelStars?.[gameId] || [];
  return stars.length === 3 && stars.every(s => s >= 3);
}

   GD-STYLE ICONS — all cube-shaped with distinct character faces
   Inspired by classic Geometry Dash icons.
================================================================= */
function rrPath(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}
function rrFillStroke(ctx, w, h, fill, stroke){
  rrPath(ctx, -w/2, -h/2, w, h, Math.max(2, w*0.1));
  ctx.fillStyle = fill; ctx.fill();
  if(stroke){ ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

      ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#ff8c00'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      const r = w * 0.32;
      for(let i=0; i<10; i++){
        const a = -Math.PI/2 + i*Math.PI/5;
        const rad = i%2===0 ? r : r*0.45;
        const x = Math.cos(a)*rad, y = Math.sin(a)*rad;
        if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;
    }
  },
];

function drawIcon(ctx, iconId, cx, cy, w, h, rot){
  const icon = ICONS.find(i => i.id === iconId) || ICONS[0];
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot || 0);
  ctx.shadowColor = icon.glow || '#00f0ff';
  ctx.shadowBlur = 14;
  icon.draw(ctx, w, h);
  ctx.restore();
}

function checkIconUnlocks(){
  state.unlockedIcons = state.unlockedIcons || ['cube'];
  const newly = [];
  for(const icon of ICONS){
    if(!state.unlockedIcons.includes(icon.id) && icon.isUnlocked()){
      state.unlockedIcons.push(icon.id);
      newly.push(icon);
    }
  }
  if(newly.length) saveState();
  return newly;
}

const defaultState = () => ({
  // per-level tracking

  levelStars:  { bianzi:[0,0,0], pinyin:[0,0,0], vocab:[0,0,0], colloc:[0,0,0], cloze:[0,0,0], reading:[0,0,0] },
  // characters
  charsTapped: [],

  // arcade
  arcadeCharges: 0,       // earned per 90%+ level — consumed on each arcade attempt
  arcadeStage: 1,         // next stage to attempt (1..15)
  arcadeBestStage: 1,     // highest stage ever cleared
  arcadeBestScore: 0,     // legacy stat for top-bar display
  // mistakes
  wrongLog: [],

  unlockedIcons: ['classic'],
  selectedIcon: 'classic',

  musicMuted: false,
});
let state = loadState();

function loadState(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return defaultState();
    return { ...defaultState(), ...JSON.parse(raw) };
  } catch(e){ return defaultState(); }
}
function saveState(){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e){}
}

/* =================================================================
   HELPERS
================================================================= */
function $(sel, root=document){ return root.querySelector(sel); }
function $$(sel, root=document){ return [...root.querySelectorAll(sel)]; }
function shuffled(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function isHan(ch){ return /[一-鿿]/.test(ch); }

// Wrap Chinese characters as tappable spans
function wrapHan(text){
  let html = '';
  for(const ch of text){
    if(isHan(ch)){
      html += `<span class="han" onclick="event.stopPropagation();tapChar('${ch}')">${ch}</span>`;
    } else if(ch === '\n'){
      html += '<br>';
    } else {
      html += ch.replace('<','&lt;').replace('>','&gt;');
    }
  }
  return html;
}

function totalStars(){
  let n = 0;
  for(const gid in state.levelStars || {}){
    (state.levelStars[gid] || []).forEach(s => { n += s; });
  }
  return n;
}
function gameStars(gameId){
  return (state.levelStars?.[gameId] || []).reduce((a,b)=>a+b,0);
}

function logWrong(entry){
  state.wrongLog = state.wrongLog || [];
  entry.when = Date.now();
  state.wrongLog.unshift(entry);
  if(state.wrongLog.length > 50) state.wrongLog.length = 50;
  saveState();
}

function ago(when){
  if(!when) return '';
  const m = (Date.now() - when) / 60000;
  if(m < 1) return 'just now';
  if(m < 60) return Math.floor(m) + ' min ago';
  const h = m/60;
  if(h < 24) return Math.floor(h) + ' hr ago';
  const d = h/24;
  if(d < 7) return Math.floor(d) + ' day' + (Math.floor(d)>=2?'s':'') + ' ago';
  return new Date(when).toLocaleDateString();
}

function updateTopStats(){

/* =================================================================
   GAME ROUTER
================================================================= */
let currentGame = null;
let gameSession = null;

function openGame(id){
  renderLevelSelect(id);
}

function openLevel(id, levelIdx){
  if(!isLevelUnlocked(id, levelIdx)) return;
  currentGame = id;
  if(id === 'cloze') startCloze(levelIdx);
  else if(id === 'reading') startReading(levelIdx);
  else startMcqGame(id, levelIdx);
}

function exitToHome(){
  currentGame = null;
  gameSession = null;
  renderHome();
}

function exitToLevelSelect(){
  if(gameSession && gameSession.meta){
    renderLevelSelect(gameSession.meta.id);
  } else if(currentGame){
    renderLevelSelect(currentGame);
  } else {
    renderHome();
  }
}

/* =================================================================
   MCQ GAMES (bianzi, pinyin, vocab, colloc)
================================================================= */
function startMcqGame(id, levelIdx){
  const meta = GAMES.find(g=>g.id===id);
  const allQs = QUESTIONS[id];
  const [start, end] = LEVELS[id][levelIdx].range;
  const qs = shuffled(allQs.slice(start, end));
  gameSession = { type:'mcq', id, levelIdx, meta, qs, idx:0, correct:0, answered:false };
  renderMcq();
}

function renderMcq(){
  const s = gameSession;
  if(s.idx >= s.qs.length){
    finishGame();
    return;
  }
  const q = s.qs[s.idx];
  const progress = ((s.idx) / s.qs.length) * 100;

  // Options: plain text — character learning happens via the question stem, not the answer options
  // (so tapping an option always commits the answer)
  const optionsHtmlFinal = q.options.map((opt, i) => `
    <div class="option" onclick="answerMcq(${i})" data-idx="${i}">
      <span class="option-letter">${'ABCD'[i]}</span>
      <span>${opt}</span>
    </div>
  `).join('');

  // Question rendering: replace ___ with .blank
  let qHtml;
  if(s.id === 'bianzi' || s.id === 'vocab' || s.id === 'colloc'){
    qHtml = wrapHan(q.q).replace(/___/g, '<span class="blank">＿＿</span>');
  } else if(s.id === 'pinyin'){
    qHtml = `<div style="text-align:center; font-size: clamp(36px, 7vw, 60px); margin: 10px 0; color: var(--neon-cyan); text-shadow: 0 0 18px var(--neon-cyan);">${wrapHan(q.q)}</div><div style="text-align:center; color:#aaa;">Choose the correct pinyin →</div>`;
  } else {
    qHtml = wrapHan(q.q);
  }

  $('#app').innerHTML = `
    <div class="game-view">
      <div class="game-header">
        <div>
          <button class="back-btn" onclick="exitToLevelSelect()">← Levels</button>
        </div>
        <div class="game-title" style="color: var(--neon-${['cyan','magenta','yellow','green','orange','purple'][s.meta.color-1]});">
          ${s.meta.zh}
        </div>
        <div style="color:#aaa;">${s.idx+1} / ${s.qs.length} · ✓ ${s.correct}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="question-card">
        <div class="question-num">QUESTION ${s.idx+1}</div>
        <div class="question-text">${qHtml}</div>
      </div>
      <div class="options">${optionsHtmlFinal}</div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" style="display:none;" onclick="nextMcq()">NEXT ▶</button>
    </div>
  `;
}

function answerMcq(i){
  const s = gameSession;
  if(s.answered) return;
  s.answered = true;
  const q = s.qs[s.idx];
  const correct = i === q.a;
  if(correct) s.correct++;
  else logWrong({
    game: s.id,
    gameName: s.meta.zh,
    q: q.q,
    options: q.options,
    his: i,
    correct: q.a,
    explanation: q.e
  });

  const opts = $$('.option');
  opts[q.a].classList.add('correct');
  if(!correct) opts[i].classList.add('wrong');

  const fb = $('#feedback');
  fb.className = 'feedback show ' + (correct ? 'good' : 'bad');
  fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Not quite.'} <br><span style="font-size:14px; opacity:0.9;">${q.e}</span>`;

  $('#nextBtn').style.display = 'block';
}

function nextMcq(){
  gameSession.idx++;
  gameSession.answered = false;
  renderMcq();
}

/* =================================================================
   CLOZE GAME
================================================================= */
function startCloze(levelIdx){
  const [start, end] = LEVELS.cloze[levelIdx].range;
  const passages = QUESTIONS.cloze.slice(start, end);
  gameSession = { type:'cloze', levelIdx, meta: GAMES.find(g=>g.id==='cloze'), passages, idx:0, totalCorrect:0, totalBlanks:0 };
  renderCloze();
}

function renderCloze(){
  const s = gameSession;
  if(s.idx >= s.passages.length){ finishGame(); return; }
  const p = s.passages[s.idx];
  // Map each blank to its answer + filled state
  s.blanksState = p.answers.map((a,i)=>({ ans:a, filled:null, isCorrect:null, idx:i }));
  s.activeBlank = 0;

  // Render passage with clickable blanks
  let passageHtml = wrapHan(p.passage);
  // replace 【N】 with blank spans
  passageHtml = passageHtml.replace(/【(\d+)】/g, (m, n) => {
    const k = parseInt(n,10)-1;
    return `<span class="cloze-blank" id="blank-${k}" onclick="setActiveBlank(${k})">${k+1}</span>`;
  });

  const bankHtml = p.bank.map((w,i)=>`
    <div class="word-chip" id="chip-${i}" onclick="placeWord(${i})">${wrapHan(w)}</div>
  `).join('');

  $('#app').innerHTML = `
    <div class="game-view">
      <div class="game-header">
        <button class="back-btn" onclick="exitToLevelSelect()">← Levels</button>
        <div class="game-title" style="color: var(--neon-orange);">短文填空 · ${p.title}</div>
        <div style="color:#aaa;">${s.idx+1}/${s.passages.length}</div>
      </div>
      <div class="question-card">
        <div class="question-num">Tap a blank, then tap a word to fill it</div>
        <div class="cloze-passage" id="passage">${passageHtml}</div>
      </div>
      <div class="word-bank">${bankHtml}</div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="submitCloze()">CHECK ANSWERS ▶</button>
    </div>
  `;
  highlightActiveBlank();
}

function setActiveBlank(i){
  gameSession.activeBlank = i;
  highlightActiveBlank();
}
function highlightActiveBlank(){
  $$('.cloze-blank').forEach(b => b.classList.remove('active'));
  const el = $('#blank-' + gameSession.activeBlank);
  if(el) el.classList.add('active');
}

function placeWord(wordIdx){
  const s = gameSession;
  const p = s.passages[s.idx];
  const bIdx = s.activeBlank;
  // Free up previously placed chip if this blank was filled
  const prev = s.blanksState[bIdx].filled;
  s.blanksState[bIdx].filled = wordIdx;
  const word = p.bank[wordIdx];
  const blankEl = $('#blank-'+bIdx);
  blankEl.innerHTML = wrapHan(word);
  blankEl.classList.add('filled');
  // mark chip used
  updateChipsUsed();
  // move to next unfilled blank
  for(let k=0;k<s.blanksState.length;k++){
    if(s.blanksState[k].filled===null){ s.activeBlank = k; break; }
  }
  highlightActiveBlank();
}
function updateChipsUsed(){
  const s = gameSession;
  const used = new Set(s.blanksState.map(b=>b.filled).filter(x=>x!==null));
  $$('.word-chip').forEach((c,i)=>{
    c.classList.toggle('used', used.has(i));
  });
}

function submitCloze(){
  const s = gameSession;
  const p = s.passages[s.idx];
  let correct = 0;
  s.blanksState.forEach((b,i)=>{
    b.isCorrect = b.filled === b.ans;
    if(b.isCorrect) correct++;
    else logWrong({
      game: 'cloze',
      gameName: '短文填空',
      q: `《${p.title}》— 第 ${i+1} 个空`,
      options: p.bank,
      his: b.filled,
      correct: b.ans,
      explanation: p.explain
    });
    const el = $('#blank-'+i);
    el.classList.remove('active');
    el.classList.add(b.isCorrect ? 'correct' : 'wrong');
    if(!b.isCorrect){
      el.innerHTML = `<s>${b.filled!==null?wrapHan(p.bank[b.filled]):'?'}</s> → <b>${wrapHan(p.bank[b.ans])}</b>`;
    }
  });
  s.totalCorrect += correct;
  s.totalBlanks += s.blanksState.length;
  const fb = $('#feedback');
  fb.className = 'feedback show ' + (correct===s.blanksState.length ? 'good':'bad');
  fb.innerHTML = `Got ${correct}/${s.blanksState.length}. <br><span style="font-size:13px; opacity:0.9;">${p.explain}</span>`;
  $('#nextBtn').textContent = s.idx === s.passages.length-1 ? 'FINISH ▶' : 'NEXT PASSAGE ▶';
  $('#nextBtn').onclick = ()=>{ s.idx++; renderCloze(); };
}

/* =================================================================
   READING COMPREHENSION
================================================================= */
function startReading(levelIdx){
  const [start, end] = LEVELS.reading[levelIdx].range;
  const passages = QUESTIONS.reading.slice(start, end);
  gameSession = { type:'reading', levelIdx, meta: GAMES.find(g=>g.id==='reading'), passages, idx:0, qIdx:0, totalCorrect:0, totalQs:0, answered:false };
  passages.forEach(p => gameSession.totalQs += p.questions.length);
  renderReading();
}

function renderReading(){
  const s = gameSession;
  if(s.idx >= s.passages.length){ finishGame(); return; }
  const p = s.passages[s.idx];

  let passageHtml;
  if(p.type === 'notice'){
    passageHtml = `
      <div class="notice-box">
        <div class="notice-title">${wrapHan(p.title)}</div>
        <div style="line-height:2;">${wrapHan(p.content)}</div>
      </div>
    `;
  } else {
    passageHtml = `<h3 style="color:var(--neon-purple); margin-bottom:10px;">${wrapHan(p.title)}</h3>
      <div class="reading-passage">${wrapHan(p.content)}</div>`;
  }

  // Show current question
  const q = p.questions[s.qIdx];
  const optionsHtml = q.options.map((opt, i) => `
    <div class="option" onclick="answerReading(${i})" data-idx="${i}">
      <span class="option-letter">${'ABCD'[i]}</span>
      <span>${wrapHan(opt)}</span>
    </div>
  `).join('');

  $('#app').innerHTML = `
    <div class="game-view">
      <div class="game-header">
        <button class="back-btn" onclick="exitToLevelSelect()">← Levels</button>
        <div class="game-title" style="color: var(--neon-purple);">阅读冲刺</div>
        <div style="color:#aaa;">Passage ${s.idx+1}/${s.passages.length} · Q ${s.qIdx+1}/${p.questions.length}</div>
      </div>
      ${passageHtml}
      <div class="question-card">
        <div class="question-num">QUESTION ${s.qIdx+1}</div>
        <div class="question-text">${wrapHan(q.q)}</div>
      </div>
      <div class="options">${optionsHtml}</div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" style="display:none;" onclick="nextReadingQ()">NEXT ▶</button>
    </div>
  `;
  s.answered = false;
}

function answerReading(i){
  const s = gameSession;
  if(s.answered) return;
  s.answered = true;
  const p = s.passages[s.idx];
  const q = p.questions[s.qIdx];
  const correct = i === q.a;
  if(correct) s.totalCorrect++;
  else logWrong({
    game: 'reading',
    gameName: '阅读冲刺',
    q: `《${p.title}》— ${q.q}`,
    options: q.options,
    his: i,
    correct: q.a,
    explanation: q.e
  });

  const opts = $$('.option');
  opts[q.a].classList.add('correct');
  if(!correct) opts[i].classList.add('wrong');

  const fb = $('#feedback');
  fb.className = 'feedback show ' + (correct ? 'good' : 'bad');
  fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Try again next time.'}<br><span style="font-size:14px; opacity:0.9;">${q.e}</span>`;
  $('#nextBtn').style.display = 'block';
}

function nextReadingQ(){
  const s = gameSession;
  const p = s.passages[s.idx];
  s.qIdx++;
  if(s.qIdx >= p.questions.length){
    s.idx++;
    s.qIdx = 0;
  }
  renderReading();
}

/* =================================================================
   FINISH / RESULTS
================================================================= */
function finishGame(){
  const s = gameSession;
  let total, correct;
  if(s.type==='mcq'){
    total = s.qs.length;
    correct = s.correct;
  } else if(s.type==='cloze'){
    total = s.totalBlanks;
    correct = s.totalCorrect;
  } else { // reading
    total = s.totalQs;
    correct = s.totalCorrect;
  }
  const pct = total === 0 ? 0 : Math.round((correct/total)*100);
  let stars = 0;
  if(pct >= 60) stars = 1;
  if(pct >= 80) stars = 2;
  if(pct >= 95) stars = 3;

  const id = s.meta.id;
  const lvl = s.levelIdx;

  // save best per level
  state.levelScores[id] = state.levelScores[id] || [0,0,0];
  state.levelStars[id]  = state.levelStars[id]  || [0,0,0];
  if(pct > (state.levelScores[id][lvl] || 0)) state.levelScores[id][lvl] = pct;
  if(stars > (state.levelStars[id][lvl] || 0)) state.levelStars[id][lvl] = stars;

  let chargeEarned = false;
  if(pct >= 90){
    state.arcadeCharges = (state.arcadeCharges || 0) + 1;
    chargeEarned = true;
  }
  const newIcons = checkIconUnlocks();
  saveState();

  const starsHtml = '★'.repeat(stars) + '<span class="star-empty">' + '★'.repeat(3-stars) + '</span>';
  const msg = pct >= 95 ? '🌟 Outstanding!! Perfect-level work.' :
              pct >= 80 ? '🎉 Awesome! Great work, Paxton.' :
              pct >= 60 ? '👍 Good effort — try again to get more stars.' :
                          '💪 Keep practicing — you\'ve got this!';

  const nextLevel = lvl + 1;
  const hasNext = nextLevel < LEVEL_COUNT;
  const nextUnlocked = hasNext && pct > 0;

  $('#app').innerHTML = `
    <div class="game-view">
      <div class="results">
        <h2>LEVEL ${lvl+1} COMPLETE</h2>
        <div style="color:#aaa;">${s.meta.zh} · ${LEVELS[id][lvl].name}</div>
        <div class="score-big">${pct}%</div>
        <div style="color:#aaa;">${correct} / ${total} correct</div>
        <div class="stars-display">${starsHtml}</div>
        <div class="result-msg">${msg}</div>
        ${chargeEarned ? `<div class="unlock-banner">🎮 +1 ARCADE CHARGE (you have ${state.arcadeCharges})</div>` : ''}
        ${newIcons.length ? newIcons.map(i => `<div class="unlock-banner">🔓 NEW ICON: ${i.name}</div>`).join('') : ''}
        <div class="result-actions">
          ${nextUnlocked ? `<button class="btn btn-magenta" onclick="openLevel('${id}',${nextLevel})">Next Level ▶</button>` : ''}
          ${arcadeAvailable() ? `<button class="btn btn-yellow" onclick="openArcade()">🎮 Play Arcade × ${state.arcadeCharges}</button>` : ''}
          <button class="btn btn-cyan" onclick="openLevel('${id}',${lvl})">↻ Retry</button>
          <button class="btn btn-outline" onclick="renderLevelSelect('${id}')">Levels</button>
          <button class="btn btn-outline" onclick="exitToHome()">Home</button>
        </div>
      </div>
    </div>
  `;
  if(stars >= 2) confetti();
  updateTopStats();
}

function confetti(){
  const colors = ['#00f0ff','#ff00d4','#ffe600','#39ff14','#ff8c00','#b14aff'];
  for(let i=0; i<40; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + '%';
    c.style.background = colors[i % colors.length];
    c.style.animationDelay = (Math.random()*0.6)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 2400);
  }
}

/* =================================================================
   CHARACTER POPUP (tap any Chinese char)
================================================================= */
function tapChar(input){
  // can be single char or multi-char word
  if(!input) return;
  // record tap
  for(const ch of input){
    if(isHan(ch) && !state.charsTapped.includes(ch)){
      state.charsTapped.push(ch);
    }
  }
  saveState();
  updateTopStats();

  // If single char, look up directly
  if(input.length === 1 && isHan(input)){
    showCharCard(input);
  } else if(input.length > 1){
    // pick first Han char that has a dict entry
    let target = null;
    for(const ch of input){ if(isHan(ch) && CHARS[ch]){ target = ch; break; } }
    if(!target) target = input.split('').find(isHan);
    if(target) showCharCard(target, input);
  }
}

function showCharCard(ch, fullWord){
  const info = CHARS[ch];
  const modal = $('#charModal');
  const card = $('#charCard');

  if(info){
    card.innerHTML = `
      <span class="closer" onclick="closeCharModal()">×</span>
      <div class="big-char">${ch}</div>
      <div class="pinyin">${info.p}</div>
      <div class="meaning"><b>Meaning:</b> ${info.e}</div>
      <div class="example">
        ${wrapHanInline(info.ex)}
        <div class="example-en">${info.exEn || ''}</div>
      </div>
      <button class="audio-btn" onclick="speakChar('${ch}', '${info.ex.replace(/'/g,"\\'")}')">🔊 Hear it</button>
      <div class="know-row">
        <button class="know" onclick="markKnow('${ch}')">I know this ✓</button>
        <button class="learn" onclick="markLearn('${ch}')">Need to learn ★</button>
      </div>
      <div class="hint">Tip: tap 🔊 once for the character, again for the example sentence.</div>
    `;
  } else {
    card.innerHTML = `
      <span class="closer" onclick="closeCharModal()">×</span>
      <div class="big-char">${ch}</div>
      <div class="pinyin">(no entry)</div>
      <div class="meaning">This character is not in the dictionary yet. Try the audio:</div>
      <button class="audio-btn" onclick="speakChar('${ch}', '${ch}')">🔊 Pronounce</button>
    `;
  }
  modal.classList.add('show');
}

function wrapHanInline(text){
  // for example sentences inside the card — keep them tappable
  let html = '';
  for(const ch of text){
    if(isHan(ch)) html += `<span class="han" onclick="tapChar('${ch}')">${ch}</span>`;
    else html += ch;
  }
  return html;
}

function closeCharModal(){
  $('#charModal').classList.remove('show');
}

function markKnow(ch){
  if(!state.charsKnown.includes(ch)) state.charsKnown.push(ch);
  state.charsLearn = state.charsLearn.filter(c=>c!==ch);
  saveState();
  closeCharModal();
}
function markLearn(ch){
  if(!state.charsLearn.includes(ch)) state.charsLearn.push(ch);
  state.charsKnown = state.charsKnown.filter(c=>c!==ch);
  saveState();
  closeCharModal();
}

let speakState = 0;
function speakChar(ch, example){
  if(!('speechSynthesis' in window)){ alert('Audio not supported in this browser.'); return; }
  // First click: speak char. Second click within ~4s: speak example.
  speakState++;
  const utter = new SpeechSynthesisUtterance(speakState%2===1 ? ch : example);
  utter.lang = 'zh-CN';
  utter.rate = speakState%2===1 ? 0.7 : 0.85;
  // try to pick a Chinese voice
  const voices = window.speechSynthesis.getVoices();
  const zh = voices.find(v => /zh|Chinese|Mandarin/i.test(v.lang) || /zh|Chinese|Mandarin/i.test(v.name));
  if(zh) utter.voice = zh;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
  setTimeout(()=>{ speakState = 0; }, 4500);
}

// Per-obstacle-type behaviors: width, render, collision (= death), floor (for landing)
const OBSTACLE_TYPES = {
  spike: {
    width: o => o.size * 22 + 4,
    spawn: (o, x, ground) => ({...o, x, y: ground}),
    render: (o, ctx, ground) => {
      ctx.fillStyle = '#ff2e63'; ctx.shadowColor = '#ff2e63'; ctx.shadowBlur = 10;
      for(let k=0; k<o.size; k++){
        const sx = o.x + k*22;
        ctx.beginPath();
        ctx.moveTo(sx, ground);
        ctx.lineTo(sx + 10, ground - 22);
        ctx.lineTo(sx + 20, ground);
        ctx.closePath(); ctx.fill();
      }
      ctx.shadowBlur = 0;
    },
    hit: (o, cube, ground) => {
      for(let k=0; k<o.size; k++){
        const sx = o.x + k*22;
        if(boxHitTriangle(cube.x, cube.y, cube.w, cube.h, sx, ground-22, 20, 22)) return true;
      }
      return false;
    },
    floor: () => null,
  },

  pillar: {
    width: o => o.w,
    spawn: (o, x, ground) => ({...o, x, y: ground - o.h}),
    render: (o, ctx) => {
      ctx.fillStyle = '#0a0014';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1;
      for(let y = o.y + 20; y < o.y + o.h; y += 20){
        ctx.beginPath(); ctx.moveTo(o.x, y); ctx.lineTo(o.x + o.w, y); ctx.stroke();
      }
      ctx.beginPath();
      ctx.moveTo(o.x + o.w/2, o.y); ctx.lineTo(o.x + o.w/2, o.y + o.h);
      ctx.stroke();
    },
    // Side/bottom hit = death; standing on top is handled via floor()
    hit: (o, cube) => {
      const overlapsX = cube.x + cube.w > o.x + 2 && cube.x < o.x + o.w - 2;
      if(!overlapsX) return false;
      // if cube's bottom is meaningfully below the pillar top, it's a side hit
      return (cube.y + cube.h > o.y + 6);
    },
    floor: (o, cube) => {
      if(cube.x + cube.w > o.x + 2 && cube.x < o.x + o.w - 2) return o.y;
      return null;
    },
  },

  platform: {
    width: o => o.w,
    spawn: (o, x) => ({...o, x, y: o.top}),
    render: (o, ctx) => {
      // chains to the ceiling
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 4]);
      ctx.beginPath(); ctx.moveTo(o.x + 12, 0); ctx.lineTo(o.x + 12, o.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(o.x + o.w - 12, 0); ctx.lineTo(o.x + o.w - 12, o.y); ctx.stroke();
      ctx.setLineDash([]);
      // platform body
      ctx.fillStyle = '#0a0014';
      ctx.fillRect(o.x, o.y, o.w, 12);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.strokeRect(o.x, o.y, o.w, 12);
    },
    // Hitting underside or sides of the platform = death (only landing on top is safe)
    hit: (o, cube) => {
      const overlapsX = cube.x + cube.w > o.x + 2 && cube.x < o.x + o.w - 2;
      if(!overlapsX) return false;
      // cube must be below the top by more than a tiny margin
      return (cube.y + cube.h > o.y + 12 && cube.y < o.y + 12);
    },
    floor: (o, cube) => {
      if(cube.x + cube.w > o.x + 2 && cube.x < o.x + o.w - 2) return o.y;
      return null;
    },
  },

  ring: {
    width: () => 30,
    spawn: (o, x) => ({...o, x, used: false, hot: 0}),
    render: (o, ctx) => {
      ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = o.hot > 0 ? 22 : 12;
      ctx.strokeStyle = o.used ? 'rgba(0,240,255,0.25)' : '#00f0ff';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(o.x, o.y, 14, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0;
      // little inner halo
      if(o.hot > 0){
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(o.x, o.y, 8, 0, Math.PI*2); ctx.stroke();
      }
    },
    hit: () => false,
    floor: () => null,
    overlap: (o, cube) => {
      const cx = cube.x + cube.w/2, cy = cube.y + cube.h/2;
      const dx = cx - o.x, dy = cy - o.y;
      return Math.sqrt(dx*dx + dy*dy) < 22;
    }
  },

  cspike: {
    width: () => 24,
    spawn: (o, x) => ({...o, x}),
    render: (o, ctx) => {
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 4]);
      ctx.beginPath(); ctx.moveTo(o.x + 11, 0); ctx.lineTo(o.x + 11, o.y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#ff2e63'; ctx.shadowColor = '#ff2e63'; ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(o.x, o.y); ctx.lineTo(o.x + 11, o.y + 22); ctx.lineTo(o.x + 22, o.y);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
    },
    hit: (o, cube) => {
      // inverted triangle: base at y, tip at y+22
      return boxHitTriangle(cube.x, cube.y, cube.w, cube.h, o.x, o.y, 22, 22, true);
    },
    floor: () => null,
  },

  saw: {
    width: o => o.r * 2 + 4,
    spawn: (o, x) => ({...o, x, angle: 0}),
    tick: o => { o.angle += 0.25; },
    render: (o, ctx) => {
      const cx = o.x + o.r, cy = o.y;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(o.angle);
      ctx.fillStyle = '#3a3a4a';
      ctx.beginPath(); ctx.arc(0, 0, o.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#999';
      for(let i=0; i<8; i++){
        ctx.save(); ctx.rotate(i * Math.PI / 4);
        ctx.beginPath();
        ctx.moveTo(0, -o.r - 5);
        ctx.lineTo(-3, -o.r + 3);
        ctx.lineTo(3, -o.r + 3);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, o.r, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#00f0ff'; ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    },
    hit: (o, cube) => {
      const cx = o.x + o.r, cy = o.y;
      const ccx = cube.x + cube.w/2, ccy = cube.y + cube.h/2;
      const dx = ccx - cx, dy = ccy - cy;
      return Math.sqrt(dx*dx + dy*dy) < o.r + cube.w/2 - 4;
    },
    floor: () => null,
  },
};

const ARCADE_DURATION_SEC = 45;
const ARCADE_MAX_STAGE = ARCADE_STAGES.length;

let arcadeCtx, arcadeRAF, arcade = null;

function arcadeAvailable(){ return (state.arcadeCharges || 0) > 0; }

function openArcade(){
  if(!arcadeAvailable()) return;
  // consume one charge immediately on commit
  state.arcadeCharges--;
  saveState();
  $('#arcadeOverlay').classList.add('show');
  startArcade();
  MUSIC.start();
  const btn = document.getElementById('musicBtn');
  if(btn) btn.textContent = state.musicMuted ? '🔇' : '🔊';
  updateTopStats();
}
function closeArcade(){
  cancelAnimationFrame(arcadeRAF);
  MUSIC.stop();
  $('#arcadeOverlay').classList.remove('show');
  if(currentGame === '__vault__') renderVault();
  else renderHome();
}

function startArcade(){
  const canvas = $('#arcadeCanvas');
  // dynamic sizing — ~92% viewport, capped at 1200
  const targetW = Math.min(Math.max(window.innerWidth * 0.92, 600), 1200);
  const targetH = 280;
  canvas.width = Math.round(targetW);
  canvas.height = targetH;

  const stageIdx = Math.min((state.arcadeStage || 1) - 1, ARCADE_MAX_STAGE - 1);
  const cfg = ARCADE_STAGES[stageIdx];

  arcadeCtx = canvas.getContext('2d');
  arcade = {
    w: canvas.width, h: canvas.height,
    ground: canvas.height - 30,
    cube: { x: 110, y: canvas.height - 30 - 28, w: 28, h: 28, vy: 0, onGround: true, rot: 0 },
    gravity: 0.85,
    jumpV: -13,
    ringJumpV: -16,
    speed: cfg.speed,
    obstacles: [],
    nextSpawn: cfg.sMax + 40,  // small grace period before first obstacle
    activeRing: null,
    t: 0,
    score: 0,
    dead: false,
    survived: false,
    stage: state.arcadeStage,
    cfg,
    startTime: performance.now(),
    timeLimitSec: ARCADE_DURATION_SEC,
  };
  $('#arcadeScore').textContent = 'STAGE ' + arcade.stage + ' · ' + ARCADE_DURATION_SEC + 's';
  cancelAnimationFrame(arcadeRAF);
  arcadeLoop();
}

function arcadeJump(){
  if(!arcade || arcade.dead) return;
  // jump ring boost — works mid-air
  if(arcade.activeRing && !arcade.activeRing.used){
    arcade.cube.vy = arcade.ringJumpV;
    arcade.cube.onGround = false;
    arcade.activeRing.used = true;
    arcade.activeRing.hot = 8;
    return;
  }
  if(arcade.cube.onGround){
    arcade.cube.vy = arcade.jumpV;
    arcade.cube.onGround = false;
  }
}

function spawnArcadeObstacle(){
  const pool = arcade.cfg.pool;
  const key = pool[Math.floor(Math.random() * pool.length)];
  const template = OBS[key];
  const handler = OBSTACLE_TYPES[template.type];
  const o = handler.spawn({...template}, arcade.w + 30, arcade.ground);
  arcade.obstacles.push(o);
}

function computeFloor(cube){
  let floor = arcade.ground;
  for(const o of arcade.obstacles){
    const h = OBSTACLE_TYPES[o.type];
    if(!h.floor) continue;
    const f = h.floor(o, cube);
    // only consider higher (smaller y) surfaces; also only if the cube is at or above them
    if(f !== null && f < floor && cube.y + cube.h <= f + 4) floor = f;
  }
  return floor;
}

document.addEventListener('keydown', (e)=>{
  if(e.code === 'Space' && $('#arcadeOverlay').classList.contains('show')){
    e.preventDefault();
    arcadeJump();
  }
});
document.addEventListener('touchstart', (e)=>{
  if($('#arcadeOverlay').classList.contains('show') && e.target.id === 'arcadeCanvas'){
    e.preventDefault();
    arcadeJump();
  }
}, { passive: false });
document.addEventListener('mousedown', (e)=>{
  if(e.target.id === 'arcadeCanvas'){
    arcadeJump();
  }
});

function renderArcadeBackground(){
  const a = arcade;
  const ctx = arcadeCtx;
  // base gradient — stage-tinted
  const grad = ctx.createLinearGradient(0,0,0,a.h);
  grad.addColorStop(0, a.cfg.bg);
  grad.addColorStop(1, '#000');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,a.w,a.h);

  // brick-wall pattern — subtle parallax scroll
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  const brickW = 80, brickH = 50;
  const offX = (a.t * a.speed * 0.3) % brickW;
  for(let row = 0; row * brickH < a.ground; row++){
    const y = row * brickH;
    const rowOffset = row % 2 === 1 ? brickW / 2 : 0;
    for(let x = -brickW - offX + rowOffset; x < a.w + brickW; x += brickW){
      ctx.strokeRect(x, y, brickW, brickH);
    }
  }

  // distant mountains — slower parallax
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.moveTo(0, a.ground);
  const mtnOffset = (a.t * a.speed * 0.15) % 100;
  for(let x = -mtnOffset; x < a.w + 100; x += 50){
    const peak = a.ground - 20 - Math.abs(Math.sin(x * 0.013)) * 22;
    ctx.lineTo(x + 25, peak);
    ctx.lineTo(x + 50, a.ground);
  }
  ctx.lineTo(a.w + 100, a.ground);
  ctx.closePath();
  ctx.fill();

  // ground line — neon cyan
  ctx.fillStyle = '#00f0ff';
  ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 14;
  ctx.fillRect(0, a.ground, a.w, 3);
  ctx.shadowBlur = 0;
}

function arcadeLoop(){
  const a = arcade;
  if(!a) return;
  const ctx = arcadeCtx;
  ctx.clearRect(0,0,a.w,a.h);

  renderArcadeBackground();

  const elapsedSec = (performance.now() - a.startTime) / 1000;
  const timeLeft = Math.max(0, a.timeLimitSec - elapsedSec);

  if(!a.dead){
    a.t++;
    a.score = Math.floor(a.t / 6);

    // Survival check
    if(elapsedSec >= a.timeLimitSec){
      a.survived = true;
      a.dead = true;
      if(state.arcadeStage < ARCADE_MAX_STAGE) state.arcadeStage++;
      if(a.stage > (state.arcadeBestStage || 1)) state.arcadeBestStage = a.stage;
      saveState();
      updateTopStats();
    }

    // PHYSICS — multi-floor (pillars / platforms can be landed on)
    a.cube.vy += a.gravity;
    a.cube.y += a.cube.vy;
    const floor = computeFloor(a.cube);
    if(a.cube.y >= floor - a.cube.h){
      a.cube.y = floor - a.cube.h;
      a.cube.vy = 0;
      a.cube.onGround = true;
      a.cube.rot = 0;
    } else {
      a.cube.onGround = false;
      a.cube.rot += 0.18;
    }
    // Cube fell off the world (shouldn't really happen but safety)
    if(a.cube.y > a.h + 50) a.dead = true;

    // SPAWN
    a.nextSpawn--;
    if(a.nextSpawn <= 0 && !a.survived){
      spawnArcadeObstacle();
      const span = a.cfg.sMax - a.cfg.sMin;
      a.nextSpawn = a.cfg.sMin + Math.floor(Math.random() * span);
    }

    // MOVE + TICK obstacles
    a.obstacles.forEach(o => {
      o.x -= a.speed;
      const h = OBSTACLE_TYPES[o.type];
      if(h.tick) h.tick(o);
    });
    a.obstacles = a.obstacles.filter(o => {
      const w = OBSTACLE_TYPES[o.type].width(o);
      return o.x + w > -10;
    });

    // RING OVERLAP — find first ring the cube touches; arms a boost on next tap
    a.activeRing = null;
    for(const o of a.obstacles){
      if(o.type !== 'ring' || o.used) continue;
      if(OBSTACLE_TYPES.ring.overlap(o, a.cube)){
        a.activeRing = o;
        o.hot = 6;
        break;
      }
    }
    a.obstacles.forEach(o => { if(o.hot > 0) o.hot--; });

    // COLLISION (death) — every obstacle except rings can kill
    for(const o of a.obstacles){
      const h = OBSTACLE_TYPES[o.type];
      if(h.hit(o, a.cube, a.ground)){
        a.dead = true;
        break;
      }
    }
  }

  // RENDER obstacles (back-to-front: spikes first, rings last so they glow on top)
  const drawOrder = ['cspike','pillar','platform','spike','saw','ring'];
  drawOrder.forEach(type => {
    a.obstacles.filter(o => o.type === type).forEach(o => {
      OBSTACLE_TYPES[o.type].render(o, ctx, a.ground);
    });
  });

  // PLAYER icon
  drawIcon(ctx, state.selectedIcon || 'classic',
    a.cube.x + a.cube.w/2, a.cube.y + a.cube.h/2,
    a.cube.w, a.cube.h, a.cube.rot);

  // HUD — stage + time + score
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.font = '18px "Russo One", sans-serif';
  ctx.shadowColor='#000'; ctx.shadowBlur=6;
  ctx.textAlign = 'left';
  ctx.fillText('STAGE ' + a.stage, 14, 24);
  ctx.textAlign = 'right';
  // colour timer red if low
  ctx.fillStyle = timeLeft < 10 ? '#ff2e63' : '#ffe600';
  ctx.fillText((timeLeft).toFixed(1) + 's', a.w - 14, 24);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '14px "Russo One", sans-serif';
  ctx.fillText('Score ' + a.score, a.w - 14, 44);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';
  $('#arcadeScore').textContent = 'STAGE ' + a.stage + ' · ' + (timeLeft).toFixed(1) + 's · Score ' + a.score;

  // Survival progress bar across the top
  const progress = Math.min(1, elapsedSec / a.timeLimitSec);
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(0, 0, a.w, 4);
  ctx.fillStyle = a.survived ? '#39ff14' : (timeLeft < 10 ? '#ff2e63' : '#00f0ff');
  ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 8;
  ctx.fillRect(0, 0, a.w * progress, 4);
  ctx.shadowBlur = 0;

  if(a.dead){
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0,0,a.w,a.h);
    if(a.survived){
      ctx.fillStyle = '#39ff14';
      ctx.font = '40px "Russo One", sans-serif';
      ctx.textAlign='center';
      ctx.shadowColor='#39ff14'; ctx.shadowBlur=18;
      ctx.fillText('STAGE ' + a.stage + ' CLEARED!', a.w/2, a.h/2 - 30);
      ctx.font = '18px "Russo One", sans-serif'; ctx.fillStyle='#fff'; ctx.shadowBlur=0;
      if(a.stage < ARCADE_MAX_STAGE){
        ctx.fillText('Next charge unlocks STAGE ' + (a.stage + 1), a.w/2, a.h/2 + 4);
      } else {
        ctx.fillText('🏆 You cleared the final stage. Legend.', a.w/2, a.h/2 + 4);
      }
      ctx.font = '14px "Noto Sans SC", sans-serif'; ctx.fillStyle='#aaa';
      ctx.fillText('Score: ' + a.score, a.w/2, a.h/2 + 30);
    } else {
      ctx.fillStyle = '#ff2e63'; ctx.font = '40px "Russo One", sans-serif';
      ctx.textAlign='center'; ctx.shadowColor='#ff2e63'; ctx.shadowBlur=18;
      ctx.fillText('CRASH!', a.w/2, a.h/2 - 30);
      ctx.font = '18px "Russo One", sans-serif'; ctx.fillStyle='#fff'; ctx.shadowBlur=0;
      ctx.fillText('STAGE ' + a.stage + ' — retry next time', a.w/2, a.h/2 + 4);
      ctx.font = '14px "Noto Sans SC", sans-serif'; ctx.fillStyle='#aaa';
      ctx.fillText('Earn another arcade charge by scoring 90%+ on a level', a.w/2, a.h/2 + 30);
    }
    ctx.textAlign = 'left';
    // check icon unlocks (arcade-best-stage may unlock things one day)
    if(a.score > (state.arcadeBestScore || 0)){
      state.arcadeBestScore = a.score;
      saveState();
      updateTopStats();
    }
  }

  arcadeRAF = requestAnimationFrame(arcadeLoop);
}

function boxHitTriangle(bx,by,bw,bh, tx,ty,tw,th, inverted){
  // simple AABB bounding box check; works for both upright and inverted triangles
  // (the small margins approximate the triangle silhouette)
  return !(bx+bw < tx+4 || bx > tx+tw-4 || by+bh < ty || by > ty+th);
}

   ICON PICKER
================================================================= */
function openIconPicker(){
  const total = ICONS.length;
  const got = (state.unlockedIcons || ['cube']).length;
  $('#iconCount').textContent = `${got} of ${total} unlocked`;
  $('#iconGrid').innerHTML = `<div class="icon-picker">${ICONS.map(icon => {
    const unlocked = (state.unlockedIcons || ['cube']).includes(icon.id);
    const selected = state.selectedIcon === icon.id;
    const cls = ['icon-tile', unlocked?'unlocked':'locked', selected?'selected':''].filter(Boolean).join(' ');
    const handler = unlocked ? `selectIcon('${icon.id}')` : `showIconHint('${icon.id}')`;
    return `
      <div class="${cls}" onclick="${handler}" onmouseover="showIconHint('${icon.id}')">
        <canvas id="iconCv-${icon.id}" width="60" height="60"></canvas>
        ${!unlocked ? '<div class="lock-pad">🔒</div>' : ''}
        <div class="icon-name">${icon.name}</div>
      </div>
    `;
  }).join('')}</div>`;
  $('#iconPicker').classList.add('show');
  // draw previews after DOM is in
  setTimeout(() => {
    ICONS.forEach(icon => {
      const cv = document.getElementById('iconCv-'+icon.id);
      if(!cv) return;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0,0,60,60);
      const unlocked = (state.unlockedIcons || ['cube']).includes(icon.id);
      ctx.globalAlpha = unlocked ? 1 : 0.25;
      drawIcon(ctx, icon.id, 30, 30, 40, 40, 0);
    });
  }, 10);
}
function showIconHint(id){
  const icon = ICONS.find(i => i.id === id);
  if(!icon) return;
  const unlocked = (state.unlockedIcons || ['cube']).includes(id);
  $('#iconTooltip').innerHTML = `<b style="color:${icon.glow};">${icon.name}</b> — ${unlocked ? '<span style="color:var(--good);">✓ unlocked</span>' : icon.unlock}`;
}
function closeIconPicker(){ $('#iconPicker').classList.remove('show'); }
function selectIcon(id){
  if(!(state.unlockedIcons||[]).includes(id)) return;
  state.selectedIcon = id;
  saveState();
  closeIconPicker();
}

function renderParent(){

    const cleared = (state.levelScores[g.id] || []).filter(s=>s>0).length;
    const stars = gameStars(g.id);
    const bestScore = Math.max(0, ...(state.levelScores[g.id] || [0]));
    const colorVar = ['cyan','magenta','yellow','green','orange','purple'][g.color-1];
    return `
      <div class="parent-stat">
        <div class="ps-game" style="color: var(--neon-${colorVar});">${g.zh}</div>
        <div class="ps-row"><span>Levels cleared:</span> <b>${cleared} / 3</b></div>
        <div class="ps-row"><span>Best score:</span> <b>${bestScore}%</b></div>
        <div class="ps-row"><span>Stars:</span> <b><span style="color:var(--neon-yellow); text-shadow:0 0 4px var(--neon-yellow);">${'★'.repeat(stars)}</span><span style="color:#333;">${'★'.repeat(9-stars)}</span></b></div>
      </div>
    `;
  }).join('');

  const wrongs = (state.wrongLog || []).slice(0, 25);
  const mistakes = wrongs.length === 0
    ? '<p style="color:#888; text-align:center; padding:24px; font-style:italic;">No mistakes logged yet. Either Paxton hasn\'t played, or he\'s perfect.</p>'
    : wrongs.map(w => {
        const gameMeta = GAMES.find(g => g.id===w.game) || { zh: w.gameName };

        return `
          <div class="mistake-card">
            <div class="mc-head">
              <span class="mc-game" style="color:var(--neon-${colorName});">${gameMeta.zh}</span>
              <span class="mc-when">${ago(w.when)}</span>
            </div>
            <div class="mc-q">${wrapHan(w.q || '')}</div>
            <div class="mc-ans">
              <div>His answer: <s style="color:var(--bad);">${wrapHan(String(hisAns))}</s></div>
              <div>Correct: <b style="color:var(--good);">${wrapHan(String(corrAns))}</b></div>
            </div>
            ${w.explanation ? `<div class="mc-note">${wrapHan(w.explanation)}</div>` : ''}
          </div>
        `;
      }).join('');

  const learnChars = (state.charsLearn || []);

    ? learnChars.map(c => `<span class="par-char" onclick="tapChar('${c}')">${c}</span>`).join('')
    : '<span style="color:#888; padding:6px;">No characters marked yet. In the dictionary popup, tap "Need to learn ★" to add one.</span>';

  const tappedRecent = (state.charsTapped || []).slice(-60).reverse();
  const tappedGrid = tappedRecent.length
    ? tappedRecent.map(c => `<span class="par-char" onclick="tapChar('${c}')">${c}</span>`).join('')
    : '<span style="color:#888; padding:6px;">No characters tapped yet.</span>';

  const known = (state.charsKnown || []).length;

  $('#app').innerHTML = `
    <div class="game-view">
      <div class="game-header">
        <button class="back-btn" onclick="exitToHome()">← Home</button>
        <div class="game-title" style="color: var(--neon-cyan);">PARENT VIEW</div>
        <div style="color:#aaa; font-size:13px;">${state.wrongLog ? state.wrongLog.length : 0} mistakes · ${state.charsTapped.length} chars seen</div>
      </div>

      <div style="color:#aaa; font-size:14px; margin-bottom:8px;">
        A look at Paxton's progress — what he got wrong, what he's curious about, and what he wants to learn.
      </div>

      <h3 class="parent-section">Per-game performance</h3>
      <div class="parent-stats-grid">${stats}</div>

      <h3 class="parent-section">Recent mistakes <span style="font-size:13px; color:#888; font-family:var(--font-body);">(latest ${wrongs.length})</span></h3>
      <div class="mistakes-list">${mistakes}</div>

      <h3 class="parent-section">Characters marked "Need to learn"</h3>
      <div class="par-char-grid">${learnGrid}</div>

      <h3 class="parent-section">Recently tapped characters <span style="font-size:13px; color:#888; font-family:var(--font-body);">(curiosity log)</span></h3>
      <div class="par-char-grid">${tappedGrid}</div>

      <div style="color:#888; font-size:13px; margin-top:14px; text-align:center;">
        Marked as known: ${known} chars · Tap any character to review pinyin, meaning, and example.
      </div>

      <div style="text-align:center; margin-top:30px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-outline" onclick="clearWrongLog()" style="font-size:12px; padding:8px 16px;">Clear Mistakes Log</button>
        <button class="btn btn-outline" onclick="exitToHome()" style="font-size:12px; padding:8px 16px;">Back to Home</button>
      </div>
    </div>
  `;
}
function clearWrongLog(){
  if(confirm('Clear all logged mistakes? (Per-game scores and stars are kept.)')){
    state.wrongLog = [];
    saveState();
    renderParent();
  }
}

   THE VAULT — collection of icons and cleared levels
================================================================= */
function renderVault(){
  currentGame = '__vault__';
  const totalCleared = countLevelsCleared();
  const stars = totalStars();
  const got = (state.unlockedIcons || []).length;

  // Icon grid
  const iconCells = ICONS.map(icon => {
    const unlocked = (state.unlockedIcons || []).includes(icon.id);
    return `
      <div class="vault-icon-cell ${unlocked?'unlocked':'locked'}" title="${unlocked ? icon.name : icon.unlock}">
        <canvas id="vaultCv-${icon.id}" width="80" height="80"></canvas>
        ${!unlocked ? '<div class="v-pad">🔒</div>' : ''}
        <div class="v-name">${unlocked ? icon.name : '?'}</div>
      </div>
    `;
  }).join('');

  // Level grid: row per game, 3 cols per level
  const levelRows = GAMES.map(g => {
    const colorVar = ['cyan','magenta','yellow','green','orange','purple'][g.color-1];
    const cells = LEVELS[g.id].map((lv, idx) => {
      const unlocked = isLevelUnlocked(g.id, idx);
      const score = state.levelScores[g.id][idx] || 0;
      const lvlStars = state.levelStars[g.id][idx] || 0;
      const cleared = score > 0;
      const mastered = lvlStars >= 3;
      const starHtml = '★'.repeat(lvlStars) + '<span style="color:#333;">' + '★'.repeat(3-lvlStars) + '</span>';
      if(!unlocked){
        return `<div class="vault-lr-cell locked"><div style="color:#888;">🔒</div></div>`;
      }
      return `
        <div class="vault-lr-cell ${cleared?'cleared':''} ${mastered?'mastered':''}" onclick="openLevel('${g.id}',${idx})" style="cursor:pointer;">
          <div class="vlr-stars">${starHtml}</div>
          <div class="vlr-pct">${cleared ? score+'%' : '—'}</div>
        </div>
      `;
    }).join('');
    return `
      <div class="vault-lr-game" style="color: var(--neon-${colorVar}); border-left: 4px solid var(--neon-${colorVar});">
        ${g.zh}<br><span style="font-size:10px; color:#999; font-family:var(--font-body);">${g.en}</span>
      </div>
      ${cells}
    `;
  }).join('');

  $('#app').innerHTML = `
    <div class="game-view">
      <div class="game-header">
        <button class="back-btn" onclick="exitToHome()">← Home</button>
        <div class="game-title" style="color: var(--neon-yellow);">THE VAULT</div>
        <div style="color:#aaa; font-size:13px;">${got}/${ICONS.length} icons · ${totalCleared}/${TOTAL_LEVELS} levels</div>
      </div>

      <div class="vault-hero">
        <h2>🏆 THE VAULT</h2>
        <p>Paxton's collection — every icon earned, every level cleared.</p>
        <div class="vault-summary">
          <div class="vault-stat"><div class="v-num">${stars}</div><div class="v-lbl">★ / ${MAX_STARS}</div></div>
          <div class="vault-stat"><div class="v-num">${totalCleared}</div><div class="v-lbl">Levels cleared</div></div>
          <div class="vault-stat"><div class="v-num">${got}</div><div class="v-lbl">Icons unlocked</div></div>
          <div class="vault-stat"><div class="v-num">${state.charsTapped.length}</div><div class="v-lbl">Chars seen</div></div>
          <div class="vault-stat"><div class="v-num">${state.arcadeCharges || 0}</div><div class="v-lbl">Arcade charges</div></div>
          <div class="vault-stat"><div class="v-num">${state.arcadeBestStage || 1}</div><div class="v-lbl">Best stage cleared</div></div>
        </div>
      </div>

      <h3 class="parent-section">Icon Collection</h3>
      <div class="vault-icons-grid">${iconCells}</div>
      <div style="margin-top:30px; font-size:13px; color:#aaa; padding: 8px 0;">
        <b>Currently equipped:</b> <span style="color: var(--neon-cyan);">${(ICONS.find(i=>i.id===state.selectedIcon)||ICONS[0]).name}</span>
        — <button class="btn btn-outline" onclick="openIconPicker()" style="font-size:11px; padding:4px 12px; margin-left:6px;">Change</button>
      </div>

      <h3 class="parent-section">Level Progress</h3>
      <div class="vault-levels-grid" style="margin-bottom:6px; font-size:11px; color:#888; grid-template-columns: 1.2fr repeat(3,1fr);">
        <div></div>
        <div style="text-align:center;">L1 · EASY</div>
        <div style="text-align:center;">L2 · MED</div>
        <div style="text-align:center;">L3 · HARD</div>
      </div>
      <div class="vault-levels-grid">${levelRows}</div>

      <div style="text-align:center; margin-top:24px;">
        <button class="btn btn-outline" onclick="exitToHome()" style="font-size:12px; padding:8px 16px;">Back to Home</button>
      </div>
    </div>
  `;

  // Draw icon previews
  setTimeout(() => {
    ICONS.forEach(icon => {
      const cv = document.getElementById('vaultCv-'+icon.id);
      if(!cv) return;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0,0,80,80);
      const unlocked = (state.unlockedIcons || []).includes(icon.id);
      ctx.globalAlpha = unlocked ? 1 : 0.25;
      drawIcon(ctx, icon.id, 40, 40, 58, 58, 0);
    });
  }, 20);
}

/* =================================================================
   PROCEDURAL ARCADE SOUNDTRACK
   Web Audio synth: kick, snare, hat, saw bass, square lead, pad chords.
   E minor → D progression at 150 BPM. GD-style energy.
================================================================= */
const MUSIC = {
  ctx:null, master:null, comp:null,
  running:false, timeout:null, step:0,
  bpm:150, vol:0.28,

  init(){
    if(this.ctx) return true;
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return false;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = state.musicMuted ? 0 : this.vol;
    this.comp = this.ctx.createDynamicsCompressor();
    this.comp.threshold.value = -14;
    this.comp.ratio.value = 4;
    this.master.connect(this.comp);
    this.comp.connect(this.ctx.destination);
    return true;
  },
  start(){
    if(!this.init()) return;
    if(this.ctx.state === 'suspended') this.ctx.resume();
    if(this.running) return;
    this.running = true;
    this.step = 0;
    this.tick();
  },
  stop(){
    this.running = false;
    if(this.timeout){ clearTimeout(this.timeout); this.timeout=null; }
  },
  setMuted(m){
    state.musicMuted = m;
    saveState();
    if(this.master && this.ctx){
      this.master.gain.cancelScheduledValues(this.ctx.currentTime);
      this.master.gain.linearRampToValueAtTime(m?0:this.vol, this.ctx.currentTime + 0.12);
    }
  },
  tick(){
    if(!this.running) return;
    const stepDur = 60 / this.bpm / 4; // 16th note
    const t = this.ctx.currentTime + 0.02;
    this.playStep(this.step, t);
    this.step++;
    this.timeout = setTimeout(()=>this.tick(), stepDur * 1000);
  },
  playStep(n, t){
    const s = n % 32;          // 32-step loop = 2 bars
    const bar = Math.floor(s/16);

    // DRUMS
    if(s % 4 === 0) this.kick(t);
    if(s === 4 || s === 12 || s === 20 || s === 28) this.snare(t);
    if(s % 2 === 0) this.hat(t, s%4===0 ? 0.10 : 0.18);
    if(s === 6 || s === 22) this.hat(t, 0.22, true);

    // BASS (E minor bar, D bar)
    const bassEm = ['E2',null,'E2',null,'E2',null,'G2','E2','E2',null,'E2',null,'B2',null,'D3',null];
    const bassD  = ['D2',null,'D2',null,'D2',null,'F#2','D2','D2',null,'D2',null,'A2',null,'C3',null];
    const bn = (bar===0 ? bassEm : bassD)[s % 16];
    if(bn) this.bass(t, bn);

    // LEAD melody
    const lead = [
      'E4', null, null, null,  'G4', null, 'B4', null,
      'A4', null, 'B4', null,  'G4', null, 'E4', null,
      'D4', null, null, null,  'F#4',null, 'A4', null,
      'B4', null, 'A4', null,  'F#4',null, 'D4', null
    ];
    const ln = lead[s];
    if(ln) this.lead(t, ln);

    // CHORD PAD on bar starts
    if(s === 0)  this.chord(t, ['E3','G3','B3'], 2 * (60/this.bpm));
    if(s === 16) this.chord(t, ['D3','F#3','A3'], 2 * (60/this.bpm));
  },
  noteHz(n){
    const notes = {C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11};
    const m = n.match(/([A-G][#b]?)(\d+)/);
    if(!m) return 440;
    const semi = notes[m[1]] + (parseInt(m[2])+1)*12;
    return 440 * Math.pow(2, (semi - 69)/12);
  },
  kick(t){
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(38, t + 0.12);
    g.gain.setValueAtTime(0.85, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 0.22);
  },
  snare(t){
    const dur = 0.16;
    const buf = this.ctx.createBuffer(1, Math.floor(this.ctx.sampleRate * dur), this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 1.6);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const bp = this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=1.2;
    const g = this.ctx.createGain(); g.gain.value = 0.5;
    src.connect(bp); bp.connect(g); g.connect(this.master);
    src.start(t);
  },
  hat(t, gain, open){
    const dur = open ? 0.18 : 0.045;
    const buf = this.ctx.createBuffer(1, Math.max(1, Math.floor(this.ctx.sampleRate * dur)), this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, open?2:4);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const hp = this.ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 7500;
    const g = this.ctx.createGain(); g.gain.value = gain;
    src.connect(hp); hp.connect(g); g.connect(this.master);
    src.start(t);
  },
  bass(t, note){
    const hz = this.noteHz(note); const dur = 0.22;
    const o = this.ctx.createOscillator(); o.type='sawtooth'; o.frequency.value = hz;
    const o2 = this.ctx.createOscillator(); o2.type='square'; o2.frequency.value = hz/2;
    const lp = this.ctx.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.setValueAtTime(1200, t);
    lp.frequency.exponentialRampToValueAtTime(320, t + dur);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.38, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(this.master);
    o.start(t); o2.start(t); o.stop(t + dur); o2.stop(t + dur);
  },
  lead(t, note){
    const hz = this.noteHz(note); const dur = 0.18;
    const o = this.ctx.createOscillator(); o.type='square'; o.frequency.value = hz;
    const o2 = this.ctx.createOscillator(); o2.type='sawtooth'; o2.detune.value = 8; o2.frequency.value = hz;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.14, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    const g2 = this.ctx.createGain();
    g2.gain.setValueAtTime(0.06, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); o2.connect(g2);
    g.connect(this.master); g2.connect(this.master);
    o.start(t); o2.start(t); o.stop(t + dur); o2.stop(t + dur);
  },
  chord(t, notes, dur){
    notes.forEach(n => {
      const o = this.ctx.createOscillator();
      o.type='triangle'; o.frequency.value = this.noteHz(n);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.045, t + 0.08);
      g.gain.setValueAtTime(0.045, t + dur - 0.12);
      g.gain.linearRampToValueAtTime(0, t + dur);
      o.connect(g); g.connect(this.master);
      o.start(t); o.stop(t + dur + 0.05);
    });
  }
};

function toggleMusic(){
  MUSIC.setMuted(!state.musicMuted);
  const btn = document.getElementById('musicBtn');
  if(btn) btn.textContent = state.musicMuted ? '🔇' : '🔊';
}
